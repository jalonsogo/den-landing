/* ── Actions ────────────────────────────────────────────────────────────── */
function setStatus(id, status) {
  const s = sb(id);
  if (!s) return;
  s.status = status;
  if (status === 'running') { s.activity = null; s.uptime = '1m'; }
  else { s.activity = null; s.uptime = null; }
  render();
}
function startCreation() {
  const ns = state.ns;
  const name = ($('#nsName') && $('#nsName').value.trim()) || ns.name;
  const workspace = ($('#nsWs') && $('#nsWs').value.trim()) || ns.workspace;
  ns.name = name; ns.workspace = workspace;
  state.creating = true;
  const nsb = { id: name, name, agent: ns.agent, agentLabel: (AGENTS.find((a) => a.id === ns.agent) || {}).label || ns.agent,
    status: 'creating', activity: null, uptime: null, changes: 0,
    workspace, branch: ns.clone ? 'main' : 'main', remote: null, group: null, color: null };
  SANDBOXES.push(nsb);
  INFO[name] = { memory: 'default', kits: ns.kits.slice(), secrets: [{ n: 'anthropic', src: 'oauth' }], ports: [], preset: 'balanced', rules: [] };
  FILES[name] = FILES['atlas-color-themes'];
  CHANGES[name] = [];
  render();
  const lines = CREATE_LOG(name, ns.kits, ns.clone, workspace);
  let i = 0;
  const t = setInterval(() => {
    const pre = $('#createLog');
    if (pre) pre.textContent = lines.slice(0, ++i).join('\n');
    if (i >= lines.length) {
      clearInterval(t);
      setTimeout(() => {
        nsb.status = 'running'; nsb.uptime = '1m';
        state.creating = false; state.modal = null;
        state.page = 'sandbox'; state.activeSandbox = name; state.termTab = 'agent'; state.dock = null;
        render();
      }, 700);
    }
  }, 240);
}

/* ── Theme ──────────────────────────────────────────────────────────────── */
const mq = matchMedia('(prefers-color-scheme: dark)');
function applyColorTheme() {
  const root = document.documentElement;
  for (const v of THEME_VARS) root.style.removeProperty(v);
  const t = THEMES.find((x) => x.id === state.colorTheme) || THEMES[0];
  const dark = root.getAttribute('data-theme') === 'dark';
  const map = dark ? t.dark : t.light;
  for (const [k, v] of Object.entries(map)) root.style.setProperty(k, v);
  root.style.setProperty('--primary', t.accent);
  root.style.setProperty('--accent', t.accent);
  root.style.setProperty('--prim-fg', '#ffffff');
}
function applyTermTheme() {
  const root = document.documentElement;
  const t = TERM_THEMES.find((x) => x.id === state.termTheme);
  if (!t || t.id === 'adaptive') { root.style.removeProperty('--ov-tbg'); root.style.removeProperty('--ov-tfg'); return; }
  root.style.setProperty('--ov-tbg', t.bg);
  root.style.setProperty('--ov-tfg', t.fg);
}
function applyThemePref(pref, skipRender) {
  state.themePref = pref;
  const dark = pref === 'dark' || (pref === 'system' && mq.matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  applyColorTheme();
  if (!skipRender) render();
}
function applyDensity(d) {
  state.density = d;
  $('#app').style.zoom = d === 'comfortable' ? '1.1' : d === 'custom' ? '1.2' : '1';
  render();
}
mq.addEventListener('change', () => { if (state.themePref === 'system') applyThemePref('system'); });
addEventListener('message', (e) => {
  const t = e.data && e.data.denTheme;
  if (t === 'dark' || t === 'light' || t === 'system') applyThemePref(t);
  const c = e.data && e.data.denColorTheme;
  if (c && THEMES.some((x) => x.id === c)) { state.colorTheme = c; applyColorTheme(); render(); }
});
window.den = {
  setTheme: applyThemePref,
  setPage: (p) => { state.page = p; render(); },
  openSandbox: (id) => { state.activeSandbox = id; state.page = 'sandbox'; state.dock = null; state.termTab = 'agent'; render(); },
  state, render
};

/* ── Event wiring (delegated) ───────────────────────────────────────────── */
document.addEventListener('click', (e) => {
  const t = e.target;
  const hit = (sel) => t.closest(sel);

  const menuKeep = hit('.ctx-menu') || hit('.kit-add-menu') || hit('.kit-more-menu') || hit('.tb-acct-menu') || hit('.fld-menu');
  if (!menuKeep) closeMenus();

  let el;
  if ((el = hit('[data-act="acct-menu"]'))) { openAcctMenu(el); return; }
  if ((el = hit('[data-act="sbx-menu"]'))) {
    e.stopPropagation();
    const r = el.getBoundingClientRect();
    openContextMenu(sb(el.dataset.sbxMenu), r.right - 200, r.bottom + 4);
    return;
  }
  if ((el = hit('[data-act="group-menu"]'))) { e.stopPropagation(); openGroupMenu(el.dataset.groupMenu, e.clientX, e.clientY); return; }
  if ((el = hit('[data-act="kit-add"]'))) { e.stopPropagation(); openKitAddMenu(el); return; }
  if ((el = hit('[data-act="kit-more"]'))) { e.stopPropagation(); openKitMoreMenu(el); return; }
  if ((el = hit('[data-fld]'))) { openFldMenu(el, el.dataset.fld); return; }
  if ((el = hit('[data-color-theme]'))) { state.colorTheme = el.dataset.colorTheme; applyColorTheme(); closeMenus(); render(); return; }
  if ((el = hit('[data-term-theme]'))) { state.termTheme = el.dataset.termTheme; applyTermTheme(); closeMenus(); render(); return; }
  if ((el = hit('[data-act="star"]'))) {
    const k = KITS.mixin.find((x) => x.name === el.dataset.star);
    if (k) { k.star = !k.star; render(); }
    return;
  }
  if ((el = hit('[data-act="stop"]')))    { closeMenus(); setStatus(el.dataset.sbxAct, 'stopped'); return; }
  if ((el = hit('[data-act="start"]')))   { closeMenus(); setStatus(el.dataset.sbxAct, 'running'); return; }
  if ((el = hit('[data-act="restart"]'))) { closeMenus(); setStatus(el.dataset.sbxAct, 'running'); return; }
  if ((el = hit('[data-act="ctx-close"]'))) { closeMenus(); return; }
  if ((el = hit('[data-act="kit-close"]'))) { state.openKit = null; render(); return; }

  /* Docks */
  if ((el = hit('[data-act="dock-info"]'))) { state.dock = state.dock === 'info' ? null : 'info'; render(); return; }
  if ((el = hit('[data-act="dock-files"]'))) { state.dock = state.dock === 'files' ? null : 'files'; state.filesTab = 'files'; render(); return; }
  if ((el = hit('[data-act="dock-close"]'))) { state.dock = null; render(); return; }
  if ((el = hit('[data-act="open-changes"]'))) { state.dock = 'files'; state.filesTab = 'changes'; render(); return; }
  if ((el = hit('[data-files-tab]'))) { state.filesTab = el.dataset.filesTab; render(); return; }
  if ((el = hit('[data-info-acc]'))) { const k = el.dataset.infoAcc; state.infoAcc[k] = !state.infoAcc[k]; render(); return; }
  if ((el = hit('[data-np-preset]'))) {
    const info = INFO[el.dataset.npSbx];
    if (info) { info.preset = el.dataset.npPreset; render(); }
    return;
  }
  if ((el = hit('[data-act="np-add-rule"]'))) { state.npDraft = { decision: 'allow' }; render(); return; }
  if ((el = hit('[data-np-dec]'))) { if (state.npDraft) { state.npDraft.decision = el.dataset.npDec; render(); } return; }
  if ((el = hit('[data-act="np-draft-cancel"]'))) { state.npDraft = null; render(); return; }
  if ((el = hit('[data-file]')) && !hit('.files-tabs')) {
    if (el.dataset.fileDir === '1') {
      const node = findFileNode(FILES[state.activeSandbox], el.dataset.file.split('/'));
      if (node) { node.open = !node.open; render(); }
    }
    return;
  }

  /* New Sandbox modal */
  if ((el = hit('[data-act="new-sandbox"]'))) {
    closeMenus();
    state.modal = 'new-sandbox'; state.creating = false;
    state.ns = { ...state.ns, name: deriveName('claude', '/Users/isabella/Code/atlas') || 'furious-blackhole',
      agent: 'claude', workspace: '/Users/isabella/Code/atlas',
      kits: KITS.mixin.filter((k) => k.star).map((k) => k.name), clone: true,
      basicOpen: true, advOpen: false, cmdOpen: true, agentOpen: false, kitDdOpen: false };
    render();
    return;
  }
  if ((el = hit('[data-act="ns-dismiss"]'))) { state.modal = null; state.creating = false; render(); return; }
  if ((el = hit('[data-act="ns-create"]'))) { startCreation(); return; }
  if ((el = hit('[data-act="ns-random"]'))) {
    state.ns.name = RANDOM_NAMES[randomIdx++ % RANDOM_NAMES.length];
    render();
    return;
  }
  if ((el = hit('[data-act="ns-agent-dd"]'))) { state.ns.agentOpen = !state.ns.agentOpen; render(); return; }
  if ((el = hit('[data-ns-agent]'))) {
    state.ns.agent = el.dataset.nsAgent; state.ns.agentOpen = false;
    state.ns.name = deriveName(state.ns.agent, state.ns.workspace) || state.ns.name;
    render();
    return;
  }
  if ((el = hit('[data-act="ns-kit-dd"]'))) { state.ns.kitDdOpen = !state.ns.kitDdOpen; render(); return; }
  if ((el = hit('[data-ns-kit-add]'))) { state.ns.kits.push(el.dataset.nsKitAdd); state.ns.kitDdOpen = false; render(); return; }
  if ((el = hit('[data-ns-kit-rm]'))) { state.ns.kits = state.ns.kits.filter((x) => x !== el.dataset.nsKitRm); render(); return; }
  if ((el = hit('[data-act="ns-clone"]'))) { state.ns.clone = !state.ns.clone; render(); return; }
  if ((el = hit('[data-ns-toggle]'))) { const k = el.dataset.nsToggle; state.ns[k] = !state.ns[k]; render(); return; }

  if ((el = hit('[data-theme-pref]'))) { applyThemePref(el.dataset.themePref); return; }
  if ((el = hit('[data-density]'))) { applyDensity(el.dataset.density); return; }
  if ((el = hit('[data-kit-view]'))) { state.kitView = el.dataset.kitView; render(); return; }
  if ((el = hit('[data-kit-tab]'))) {
    const variant = state.page === 'mixins' ? 'mixin' : 'sandbox';
    state.kitTab[variant] = el.dataset.kitTab;
    render();
    return;
  }
  if ((el = hit('[data-kit]'))) {
    if (hit('[data-stop]')) return;
    const key = el.dataset.kit;
    state.openKit = state.openKit === key ? null : key;
    state.kitView = 'summary';
    render();
    return;
  }
  if ((el = hit('[data-term-tab]'))) { state.termTab = el.dataset.termTab; render(); return; }
  if ((el = hit('[data-nav]'))) { state.page = el.dataset.nav; render(); return; }
  if ((el = hit('[data-sbx]'))) {
    const s = sb(el.dataset.sbx);
    if (s && s.status !== 'creating') {
      state.activeSandbox = s.id; state.page = 'sandbox'; state.termTab = 'agent'; state.dock = null;
      render();
    }
    return;
  }
});
document.addEventListener('input', (e) => {
  if (e.target.id === 'nsName') state.ns.name = e.target.value;
  if (e.target.id === 'nsWs') state.ns.workspace = e.target.value;
});
document.addEventListener('contextmenu', (e) => {
  const file = e.target.closest('[data-file]');
  const row = e.target.closest('[data-sbx]');
  const grp = e.target.closest('[data-group]');
  e.preventDefault();
  if (file) { openFileMenu(file.dataset.file, file.dataset.fileDir === '1', e.clientX, e.clientY); return; }
  if (row) { const s = sb(row.dataset.sbx); if (s && s.status !== 'creating') openContextMenu(s, e.clientX, e.clientY); return; }
  if (grp) { openGroupMenu(grp.dataset.group, e.clientX, e.clientY); return; }
  closeMenus();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeMenus(); if (state.modal && !state.creating) { state.modal = null; render(); } } });

/* ── Boot ───────────────────────────────────────────────────────────────── */
const q = new URLSearchParams(location.search);
const qc = q.get('color');
if (qc && THEMES.some((x) => x.id === qc)) state.colorTheme = qc;
applyThemePref(q.get('theme') === 'dark' ? 'dark' : q.get('theme') === 'light' ? 'light' : 'system', true);
if (q.get('embed') === 'kit') {
  // focused embed: a kit's summary, showing what it adds to a sandbox
  const k = KITS.mixin.find((x) => x.name === 'workspace-context') || KITS.mixin[0];
  document.documentElement.classList.add('embed-kit');
  document.head.insertAdjacentHTML('beforeend',
    '<style>'
    + 'html.embed-kit #overlays{display:none;}'
    + '.embed-kit-wrap{min-height:100vh;padding:20px 22px;box-sizing:border-box;}'
    + '.embed-kit-hd{display:flex;align-items:center;gap:10px;margin-bottom:4px;padding-bottom:14px;border-bottom:1px solid var(--border);}'
    + '.embed-kit-hd svg{color:var(--t2);}'
    + '.embed-kit-hd .ekh-name{font-size:15.5px;font-weight:600;color:var(--t1);}'
    + '.embed-kit-hd .ekh-tag{font-size:11px;color:var(--t3);background:var(--bg-subtle);border:1px solid var(--border);border-radius:100px;padding:2px 10px;}'
    + '</style>');
  document.getElementById('app').innerHTML =
    '<div class="embed-kit-wrap">'
    + '<div class="embed-kit-hd">' + ic('layers', 18) + '<span class="ekh-name">' + k.name + '</span><span class="ekh-tag">mixin kit</span></div>'
    + kitSummary(k, 'mixin')
    + '</div>';
} else if (q.get('embed') === 'network') {
  // focused embed: render only the network-policy panel of a sample sandbox
  const s = sb('atlas-color-themes');
  state.infoAcc = { workspaces:false, kits:false, secrets:false, ports:false, network:true };
  document.documentElement.classList.add('embed-net');
  document.head.insertAdjacentHTML('beforeend',
    '<style>'
    + 'html.embed-net #overlays{display:none;}'
    + '.embed-net-wrap{position:relative;min-height:100vh;padding:18px 20px;box-sizing:border-box;overflow:hidden;}'
    + '.embed-net .info-dock{display:block;border:0;box-shadow:none;background:transparent;height:auto;}'
    + '.embed-net .info-dock-hd,.embed-net .info-stats,.embed-net .np-note{display:none;}'
    + '.embed-net .info-panel{overflow:visible;padding:0;}'
    + '.embed-net .info-acc{border-top:0;}'
    + '.embed-net .info-acc:not(.open){display:none;}'
    + '.embed-net .info-acc-hd{pointer-events:none;}'
    + '.embed-cursor{position:absolute;left:0;top:0;z-index:50;width:22px;height:22px;pointer-events:none;transition:transform .8s cubic-bezier(.4,0,.2,1);}'
    + '.embed-cursor svg{width:22px;height:22px;display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));transition:transform .12s;}'
    + '.embed-cursor.tap svg{transform:scale(.82);}'
    + '.ec-ripple{position:absolute;left:-4px;top:-4px;width:22px;height:22px;border-radius:50%;background:#C0702E;opacity:0;}'
    + '.ec-ripple.go{animation:ecr .62s ease-out;}'
    + '@keyframes ecr{0%{opacity:.5;transform:scale(.25);}100%{opacity:0;transform:scale(2.6);}}'
    + '.np-rule-added{overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .45s ease,opacity .35s ease,transform .35s ease;}'
    + '.np-rule-added.in{max-height:150px;opacity:1;transform:none;}'
    + '.np-add-form.anim{animation:npf .28s ease;}'
    + '@keyframes npf{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}'
    + '.embed-net .np-add-input.act{outline:2px solid rgba(192,112,46,.45);outline-offset:0;}'
    + '</style>');
  document.getElementById('app').innerHTML = '<div class="embed-net-wrap">' + renderInfoDock(s) + '</div>';
  // loop: cursor opens "+ Add rule", types a domain, clicks Add, then the rule appears
  (function () {
    const wrap = document.querySelector('.embed-net-wrap');
    const addBtn = document.querySelector('[data-act="np-add-rule"]');
    const addBox = document.querySelector('.np-add-box');
    const cta = document.querySelector('.np-add-cta');
    const rules = document.querySelector('.np-rules');
    const badge = document.querySelector('.info-acc.open .info-acc-badge');
    if (!wrap || !addBtn || !addBox || !rules) return;
    const cur = document.createElement('div');
    cur.className = 'embed-cursor';
    cur.innerHTML = '<span class="ec-ripple"></span><svg viewBox="0 0 24 24" fill="#FBF7ED" stroke="#241A0F" stroke-width="1.3" stroke-linejoin="round"><path d="M5.4 2.8 5.4 17.6 9.1 14.1 11.6 19.8 13.9 18.8 11.4 13.1 16.3 12.9 Z"/></svg>';
    wrap.appendChild(cur);
    const ripple = cur.querySelector('.ec-ripple');
    const baseCount = badge ? (parseInt(badge.textContent, 10) || 0) : 0;
    const DOMAIN = 'huggingface.co';
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const rel = (el) => { const b = el.getBoundingClientRect(), w = wrap.getBoundingClientRect(); return { x: b.left - w.left, y: b.top - w.top, w: b.width, h: b.height }; };
    const moveToEl = (el, dx, dy) => { const a = rel(el); cur.style.transform = 'translate(' + (a.x + (dx == null ? a.w * 0.5 : dx)) + 'px,' + (a.y + (dy == null ? a.h * 0.5 : dy)) + 'px)'; };
    const moveXY = (x, y) => { cur.style.transform = 'translate(' + x + 'px,' + y + 'px)'; };
    const tap = async (el) => {
      ripple.classList.remove('go'); void ripple.offsetWidth; ripple.classList.add('go');
      cur.classList.add('tap'); if (el) el.style.transform = 'scale(.96)';
      await sleep(150);
      cur.classList.remove('tap'); if (el) el.style.transform = '';
    };
    const formHtml =
      '<div class="np-add-form np-rule np-rule-draft anim">'
      + '<div class="np-dec-seg"><button class="np-dec-opt on">' + ic('check', 13, 'np-dec-ic-allow') + ' Allow</button>'
      + '<button class="np-dec-opt">' + ic('x', 13, 'np-dec-ic-block') + ' Block</button></div>'
      + '<input class="np-add-input" placeholder="example.com,  *.example.com:443" />'
      + '<div class="np-add-form-actions"><button class="btn btn-ghost btn-sm">Cancel</button>'
      + '<button class="btn btn-default btn-sm np-add-confirm">Add</button></div></div>';
    (async function loop() {
      moveToEl(addBtn, null, null); // start at the button
      while (true) {
        await sleep(1400);
        // 1) click "+ Add rule"
        moveToEl(addBtn, addBtn.getBoundingClientRect().width * 0.5 - 4, -2);
        await sleep(780);
        await tap(addBtn);
        // 2) open the draft form (hide the CTA row while it's open)
        if (cta) cta.style.display = 'none';
        addBox.insertAdjacentHTML('afterbegin', formHtml);
        const form = addBox.querySelector('.np-add-form');
        const input = form.querySelector('.np-add-input');
        const confirm = form.querySelector('.np-add-confirm');
        await sleep(360);
        // 3) move to the input and type the domain
        moveToEl(input, 18, input.getBoundingClientRect().height * 0.5);
        await sleep(520);
        input.classList.add('act');
        input.value = '';
        for (let i = 0; i < DOMAIN.length; i++) { input.value += DOMAIN[i]; await sleep(58 + (i % 3) * 22); }
        await sleep(420);
        input.classList.remove('act');
        // 4) click Add
        moveToEl(confirm, confirm.getBoundingClientRect().width * 0.5, confirm.getBoundingClientRect().height * 0.5);
        await sleep(560);
        await tap(confirm);
        // 5) close the form, the new rule slides in
        form.remove();
        if (cta) cta.style.display = '';
        const nr = document.createElement('div');
        nr.className = 'np-rule np-rule-added';
        nr.innerHTML = '<div class="np-rule-hd"><span class="np-dec np-dec-allow">ALLOW</span><span class="np-rule-name">local</span><span class="np-scope">sandbox:atlas-color-themes · local</span></div><div class="np-res"><span class="np-chip">' + DOMAIN + '</span></div>';
        rules.appendChild(nr);
        void nr.offsetWidth;
        nr.classList.add('in');
        if (badge) badge.textContent = String(baseCount + 1);
        await sleep(2600);
        // 6) reset
        nr.classList.remove('in');
        if (badge) badge.textContent = String(baseCount);
        await sleep(480);
        nr.remove();
        moveToEl(addBtn, null, null);
        await sleep(700);
      }
    })();
  })();
} else {
  render();
}
</script>
</body>
</html>
