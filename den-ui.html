<!doctype html>
<!--
  den — interactive UI capture (self-contained).

  A faithful, dependency-free replica of the den app UI for embedding in other
  pages. Generated from the app's real stylesheet (src/renderer/src/styles/main.css,
  embedded verbatim) plus a vanilla-JS layer that mirrors the app's behavior:

    · switching sandboxes (sidebar / dashboard), stop-start-restart
    · Agent / Shell terminals showing REAL captured CLI output
      (claude, codex, opencode recorded through a PTY; bash for the shell tab)
    · Files dock (browsable tree, Changes tab) and Info dock (accordion sections,
      network policy) per sandbox
    · Mixin Kits & Sandbox Kits with the Browse-contrib marketplace
    · right-click context menus (sandbox, group, file rows)
    · New Sandbox modal with a streaming creation-log flow
    · Settings: light/dark/system, full-interface color themes, density

  Theming:
    · follows prefers-color-scheme automatically
    · force with  ?theme=light | ?theme=dark  in the URL
    · pick a color theme with  ?color=graphite|blue|green|violet|orange|rose
    · or postMessage({ denTheme: 'dark' }) / postMessage({ denColorTheme: 'orange' })
      from the embedding page

  Embed:  <iframe src="den-ui.html" style="width:100%;height:720px;border:0"></iframe>
-->
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>den — sandboxed coding agents</title>
<style>
/* ═══ den application stylesheet (embedded verbatim) ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:          #ffffff;
  --bg-muted:    #fafafa;
  --bg-subtle:   #f4f4f5;
  --border:      #e4e4e7;
  --border-hi:   #d4d4d8;
  --t1:          #09090b;
  --t2:          #52525b;
  --t3:          #a1a1aa;
  --t4:          #d4d4d8;
  --primary:     #18181b;
  --prim-fg:     #ffffff;
  --destruct:    #ef4444;
  --green:       #22c55e;
  --green-dim:   rgba(34,197,94,0.12);
  --blue:        #3b82f6;
  --yellow:      #f59e0b;
  --radius:      6px;
  --sb:          #f5f5f5;
  --sb-border:   #e4e4e7;
  --sb-fg:       #18181b;
  --sb-muted:    #71717a;
  --sb-hover:    rgba(0,0,0,0.05);
  --sb-active:   rgba(0,0,0,0.07);
  --sb-active-fg:#09090b;
  --spinner-track: rgba(0,0,0,0.15);
}

[data-theme="dark"] {
  /* GitHub-dark palette */
  --bg:          #0D1117;  /* canvas */
  --bg-muted:    #161B22;  /* panel */
  --bg-subtle:   #1C2128;  /* elevated card / input */
  --border:      #30363D;
  --border-hi:   #444C56;
  --t1:          #E6EDF3;  /* primary text */
  --t2:          #8B949E;  /* secondary */
  --t3:          #6E7681;  /* muted / placeholder */
  --t4:          #484F58;  /* faint */
  --primary:     #E6EDF3;
  --prim-fg:     #0D1117;
  --destruct:    #F85149;
  --green:       #3FB950;
  --green-dim:   rgba(63,185,80,0.15);
  --blue:        #58A6FF;
  --yellow:      #D29922;
  --sb:          #161B22;  /* sidebar = panel */
  --sb-border:   #30363D;
  --sb-fg:       #E6EDF3;
  --sb-muted:    #8B949E;
  --sb-hover:    #21262D;
  --sb-active:   #21262D;  /* selected row */
  --sb-active-fg:#E6EDF3;
  --spinner-track: rgba(255,255,255,0.18);
}

html, body, #root {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 13px;
  color: var(--t1);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.app-root {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Toolbar ── */
.toolbar {
  height: 52px;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px 0 80px;
  gap: 8px;
  position: relative;
  -webkit-app-region: drag;
  user-select: none;
}

.toolbar button,
.toolbar input,
.toolbar a {
  -webkit-app-region: no-drag;
}

.tb-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}
.tb-title { font-size: 13px; font-weight: 600; color: var(--t1); letter-spacing: -0.01em; }
.tb-sub   { font-size: 11px; color: var(--t3); margin-top: 1px; }

.tb-search {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 9px;
  width: 196px;
  cursor: pointer;
  font: inherit;
  text-align: left;
}
.tb-search:hover { border-color: var(--t3); }
.tb-search-ph { font-size: 12px; color: var(--t3); flex: 1; }
.tb-search-kbd {
  font-size: 10px;
  color: var(--t4);
  background: var(--bg-muted);
  border: 1px solid var(--border);
  padding: 0 4px;
  border-radius: 3px;
}

.tb-btn {
  height: 28px;
  padding: 0 10px;
  border-radius: var(--radius);
  background: var(--primary);
  color: var(--prim-fg);
  border: none;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: opacity 0.15s;
}
.tb-btn:hover { opacity: 0.85; }

.tb-icon-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--radius);
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--t3);
  transition: background 0.1s, color 0.1s;
}
.tb-icon-btn:hover { background: var(--bg-subtle); color: var(--t1); }

/* Toolbar separator + account */
.tb-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.tb-acct-wrap { position: relative; -webkit-app-region: no-drag; }
.tb-acct {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; border-radius: 7px;
  border: none; background: none; cursor: pointer; color: var(--t1);
  max-width: 240px;
}
.tb-acct:hover { background: var(--bg-subtle); }
.tb-acct-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--green-dim); color: var(--green); object-fit: cover;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.tb-acct-idy { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; line-height: 1.25; }
.tb-acct-name {
  font-size: 12px; font-weight: 500; color: var(--t1); max-width: 160px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tb-acct-org {
  font-size: 10.5px; color: var(--t3); max-width: 160px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tb-acct-menu {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 100;
  -webkit-app-region: no-drag;
  min-width: 220px; padding: 5px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
}
.tb-acct-hd { padding: 6px 8px; }
.tb-acct-hd-name { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.tb-acct-hd-sub {
  font-size: 11px; color: var(--t3); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tb-acct-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--t3); padding: 6px 8px 3px;
}
.tb-acct-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--t1);
  padding: 7px 8px; border-radius: 5px; cursor: pointer;
}
.tb-acct-item:hover { background: var(--bg-subtle); }
.tb-acct-divider { height: 1px; background: var(--border); margin: 5px 0; }
/* Segmented control (e.g. Light / Dark / Computer) */
.seg {
  display: inline-flex; border: 1px solid var(--border); border-radius: 7px;
  overflow: hidden; background: var(--bg);
}
.seg-opt {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--t2); cursor: pointer;
  padding: 5px 11px; border: none; background: none; border-left: 1px solid var(--border);
}
.seg-opt:first-child { border-left: none; }
.seg-opt:hover { background: var(--bg-subtle); color: var(--t1); }
.seg-opt.on { color: var(--primary); background: color-mix(in srgb, var(--primary) 12%, var(--bg)); font-weight: 600; }
.ss-density { display: flex; align-items: stretch; gap: 10px; }
.ss-density-custom {
  display: inline-flex; align-items: center; gap: 4px;
  border: 1px solid var(--border); border-radius: 7px; padding: 0 8px 0 10px;
  background: var(--bg); color: var(--t2); font-size: 12px;
}
.ss-density-custom span { color: var(--t3); }
.ss-density-custom input {
  width: 46px; border: none; background: none; color: var(--t1);
  font-size: 12px; font-weight: 600; text-align: right; padding: 0;
}
.ss-density-custom input:focus { outline: none; }
.tb-acct-signout {
  display: flex; align-items: center; gap: 7px; width: 100%;
  font-size: 12.5px; color: var(--destruct); cursor: pointer;
  padding: 7px 8px; border-radius: 5px; border: none; background: none; text-align: left;
}
.tb-acct-signout:hover { background: rgba(239,68,68,0.08); }

/* ── Layout ── */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 216px;
  flex-shrink: 0;
  background: var(--sb);
  border-right: 1px solid var(--sb-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.sb-resize {
  position: absolute; top: 0; right: 0; width: 5px; height: 100%;
  cursor: col-resize; z-index: 50;
}
.sb-resize:hover { background: var(--accent, var(--primary)); opacity: 0.5; }

.sb-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 13px 14px 12px;
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}
.sb-logo img { width: 20px; height: 20px; object-fit: contain; }
.sb-logo-name { font-size: 14px; font-weight: 600; color: var(--sb-fg); letter-spacing: -0.02em; }

.sb-section { padding: 12px 8px 0; }

.sb-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--sb-muted);
  padding: 0 8px 5px;
  display: block;
}
/* No jarring OS focus ring on sidebar controls; subtle ring for keyboard nav. */
.sidebar button:focus { outline: none; }
.sidebar button:focus-visible { outline: 2px solid var(--border-hi); outline-offset: -2px; border-radius: 6px; }

.sb-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  min-width: 0;
  margin-bottom: 2px;
  transition: background 0.1s;
}
.sb-item:hover { background: var(--sb-hover); }
.sb-item.active { background: var(--sb-active); }
/* Shift-drag reorder: line marking the drop gap above/below the row. */
.sb-item.drop-before { box-shadow: inset 0 2px 0 var(--accent, var(--primary)); }
.sb-item.drop-after { box-shadow: inset 0 -2px 0 var(--accent, var(--primary)); }

/* Sandbox avatar with agent badge */
.sbx-avatar {
  position: relative; width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  background: var(--sb-active); color: var(--sb-fg);
  display: flex; align-items: center; justify-content: center;
  /* Surface the badge ring blends into; overridden off the sidebar. */
  --avatar-surface: var(--sb);
}
.sbx-avatar-editable { cursor: pointer; transition: filter 0.1s; }
.sbx-avatar-editable:hover { filter: brightness(1.08); }
.sbx-avatar-txt { font-size: 11px; font-weight: 600; color: inherit; letter-spacing: 0.2px; }
.sbx-avatar-badge {
  position: absolute; right: -3px; bottom: -3px;
  width: 17px; height: 17px; border-radius: 50%;
  background: var(--avatar-surface); border: 2px solid var(--avatar-surface);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.sbx-avatar-spinner {
  width: 15px; height: 15px; border-radius: 50%;
  border: 2px solid var(--spinner-track); border-top-color: var(--destruct);
  animation: spin 0.7s linear infinite;
}
.sbx-avatar-activity {
  position: absolute; left: -3px; top: -3px;
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid var(--avatar-surface);
  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15);
}
.sbx-avatar-activity.running { background: var(--green); }
.sbx-avatar-activity.working { background: var(--yellow); animation: activity-pulse 1.3s ease-in-out infinite; }
.sbx-avatar-activity.waiting { background: var(--blue); animation: activity-pulse 1.3s ease-in-out infinite; }
.sbx-avatar-activity.stopped { background: var(--border-hi); }
.sbx-avatar-activity.alert { background: var(--destruct); animation: activity-pulse 1.3s ease-in-out infinite; }
@keyframes activity-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(0.78); }
}
.sb-item-sub.is-working { color: var(--yellow); }
/* Dim (but don't grayscale) stopped avatars, so the project color still reads —
   the grey status dot + muted name already signal "stopped". */
.sb-item.is-stopped .sbx-avatar { opacity: 0.7; }

.sb-item.is-stopped .sb-item-name { color: var(--sb-muted); }
.sb-item.is-deleting { pointer-events: none; opacity: 0.7; }
/* Momentary flash on a just-created sandbox so it's easy to spot. */
@keyframes sb-flash {
  0%, 30% { background: color-mix(in srgb, var(--accent, var(--primary)) 32%, transparent); }
  100% { background: transparent; }
}
.sb-item.just-created { animation: sb-flash 1.8s ease-out 2; }
.sb-item-changes {
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 2px; margin-left: auto;
  font-size: 10px; font-weight: 500; color: var(--yellow);
  background: color-mix(in srgb, var(--yellow) 15%, transparent);
  border-radius: 9px; padding: 1px 6px;
}
.sb-item-changes svg { flex-shrink: 0; }
/* When the changes pill is present it takes the auto-margin; keep the menu tight. */
.sb-item-changes + .sb-item-menu { margin-left: 4px; }
.sb-item-menu {
  flex-shrink: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--sb-muted); cursor: pointer; border-radius: 6px;
  opacity: 0; transition: opacity 0.1s;
}
.sb-item:hover .sb-item-menu { opacity: 1; }
.sb-item-menu:hover { background: var(--sb-active); color: var(--sb-fg); }

.sb-item-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 5px;
}
.sb-item-dot.running { background: var(--green); animation: pulse 2s infinite; }
.sb-item-dot.stopped { background: #d4d4d8; }

.sb-spinner {
  width: 9px;
  height: 9px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 4px;
  border-radius: 50%;
  border: 1.5px solid var(--spinner-track);
  border-top-color: var(--destruct, #ef4444);
  animation: spin 0.7s linear infinite;
}

.sb-item-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.sb-item-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--sb-fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.25;
}
.sb-item.active .sb-item-name { font-weight: 500; }

.sb-item-sub {
  font-size: 11px;
  color: var(--sb-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 5px;
  line-height: 1;
}
.sb-item-time { font-size: 10.5px; color: var(--sb-muted); flex-shrink: 0; align-self: flex-start; margin-top: 4px; }

.sb-new {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--sb-muted);
  margin-top: 2px;
  transition: all 0.1s;
}
.sb-new:hover { background: var(--sb-hover); color: var(--sb-fg); }

.sb-div { height: 1px; background: var(--sb-border); margin: 10px 8px; }
/* Divider between groups on the collapsed rail (headers are hidden there). */
.sb-rail-sep { height: 1px; background: var(--sb-border); margin: 7px 16px; }

.sb-nav { padding: 0 8px; }
.sb-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  color: var(--sb-muted);
  margin-bottom: 1px;
  transition: all 0.1s;
}
.sb-nav-item:hover { background: var(--sb-hover); color: var(--sb-fg); }
.sb-nav-item.active { background: var(--sb-active); color: var(--sb-active-fg); }

.sb-foot {
  padding: 8px 12px;
  border-top: 1px solid var(--sb-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 7px;
  font-size: 11px;
  color: var(--sb-muted);
  flex-shrink: 0;
}
.sb-foot-text { display: flex; align-items: center; gap: 7px; }
.sb-foot-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.sb-foot-plug { color: var(--green); flex-shrink: 0; }

/* ── Sidebar header (collapse control, no logo) ── */
.sb-head {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 10px;
  flex-shrink: 0;
  -webkit-app-region: drag;
}
.sb-icon-btn {
  -webkit-app-region: no-drag;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--sb-muted);
  cursor: pointer;
  transition: all 0.1s;
}
.sb-icon-btn:hover { background: var(--sb-hover); color: var(--sb-fg); }

/* ── Sidebar bottom group (Account + Settings) ── */
.sb-bottom { padding: 6px 8px 8px; margin-top: auto; }
.sb-acct {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 8px; border-radius: 8px; cursor: pointer;
  transition: background 0.1s; margin-bottom: 2px;
}
.sb-acct:hover { background: var(--sb-hover); }
.sb-acct-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--green-dim); color: var(--green);
  border: 1px solid var(--green-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.sb-acct-info { display: flex; flex-direction: column; min-width: 0; gap: 1px; }
.sb-acct-name { font-size: 12.5px; color: var(--sb-fg); line-height: 1.2; }
.sb-acct-sub {
  font-size: 10.5px; color: var(--sb-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
}

/* Top nav group + sandbox filter/add */
.sb-nav-top { padding-top: 4px; }
/* Home sits in a header-height band so its bottom border lines up with the
   detail/page header on the right; the SANDBOXES section below then aligns
   with the content tabs. */
.sb-nav-first {
  height: 45px; padding-top: 0;
  display: flex; flex-direction: column; justify-content: center;
  border-bottom: 1px solid var(--sb-border);
}
.sb-nav-first + .sb-div { display: none; }
.sb-filter-row { display: flex; gap: 6px; align-items: center; padding: 0 8px 6px; }
.sb-filter {
  flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0;
  background: var(--sb-hover); border: 1px solid var(--sb-border);
  border-radius: 6px; padding: 4px 7px;
}
.sb-filter input {
  flex: 1; min-width: 0; background: none; border: none; outline: none;
  font-size: 11.5px; color: var(--sb-fg);
}
.sb-filter input::placeholder { color: var(--sb-muted); }
.sb-add {
  width: 24px; height: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; border: none;
  background: none; color: var(--sb-muted); cursor: pointer; transition: all 0.1s;
}
.sb-add:hover { background: var(--sb-hover); color: var(--sb-fg); }
.sb-add-collapsed { margin: 10px auto 12px; }
.sb-empty { font-size: 12px; color: var(--sb-muted); text-align: center; padding: 10px 8px; }

/* Sandboxes section fills remaining vertical space, list scrolls */
.sb-section-grow { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.sb-list { flex: 1; min-height: 0; overflow-y: auto; }

/* Collapsed-rail tooltips */
.sb-tip {
  background: var(--t1);
  color: var(--bg);
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 9px;
  border-radius: 6px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.22);
  user-select: none;
  z-index: 200;
  max-width: 320px;
  word-break: break-all;
}
.sb-tip-arrow { fill: var(--t1); }

/* Collapsed project hover popover */
.sb-proj-pop {
  position: fixed; z-index: 300;
  width: 224px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  padding: 7px;
}
.sb-proj-pop-hd {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 6px 7px; font-size: 12px; font-weight: 600; color: var(--t1);
}
.sb-proj-pop-hd > svg { color: var(--t3); flex-shrink: 0; }
.sb-proj-pop-count {
  margin-left: auto; font-size: 11px; color: var(--t3);
  background: var(--bg-subtle); border-radius: 100px; padding: 1px 7px;
}
.sb-proj-pop-path {
  font-size: 11px; color: var(--t3); font-family: 'SF Mono','Menlo',monospace;
  padding: 0 6px 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sb-proj-pop-empty { font-size: 12px; color: var(--t3); padding: 6px; }

/* Collapsed-rail hover flyout for a sandbox (name/project/status/duration) */
.sb-item-pop {
  position: fixed; z-index: 300; width: 200px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25); padding: 8px 10px;
}
.sb-item-pop-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.sb-item-pop-name {
  font-size: 12.5px; font-weight: 600; color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sb-item-pop-status {
  margin-left: auto; flex-shrink: 0; font-size: 10px; color: var(--t3);
  background: var(--bg-subtle); border-radius: 100px; padding: 1px 7px;
}
.sb-item-pop-status[data-on='true'] { color: var(--green); }
.sb-item-pop-row {
  display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--t2);
  padding: 1.5px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sb-item-pop-row > svg { color: var(--t3); flex-shrink: 0; }
.sb-item-pop-sep { height: 1px; background: var(--border); margin: 6px -2px; }

/* Remove-project footer in the project popover */
.sb-proj-pop-foot { margin-top: 4px; border-top: 1px solid var(--border); padding-top: 6px; }
.sb-proj-pop-rm {
  display: flex; align-items: center; gap: 7px; width: 100%;
  padding: 6px; border: none; background: none; border-radius: 6px;
  font-size: 12px; color: var(--t3); cursor: pointer;
}
.sb-proj-pop-rm:hover { background: color-mix(in srgb, var(--destruct) 10%, transparent); color: var(--destruct); }
.sb-proj-pop-chk { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--t2); padding: 4px 6px; cursor: pointer; }
.sb-proj-pop-delrow { display: flex; gap: 6px; margin-top: 4px; }
.sb-proj-pop-cancel, .sb-proj-pop-confirm {
  flex: 1; font-size: 12px; padding: 5px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border);
}
.sb-proj-pop-cancel { background: var(--bg-subtle); color: var(--t2); }
.sb-proj-pop-cancel:hover { color: var(--t1); }
.sb-proj-pop-confirm { background: var(--destruct); color: #fff; border-color: var(--destruct); }
.sb-proj-pop-confirm:hover { filter: brightness(1.08); }
.sb-proj-pop-new {
  display: flex; align-items: center; gap: 7px; width: 100%;
  margin-top: 4px; border-top: 1px solid var(--border); padding: 8px 6px 4px;
  border-left: none; border-right: none; border-bottom: none;
  background: none; border-radius: 0;
  font-size: 12px; color: var(--t2); cursor: pointer;
}
.sb-proj-pop-new:hover { background: var(--bg-subtle); color: var(--t1); }
.sb-proj-pop-list {
  max-height: 240px; overflow: auto;
}
.sb-proj-pop-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 6px; border: none; background: none; border-radius: 6px;
  font-size: 12px; color: var(--t1); cursor: pointer; text-align: left;
}
.sb-proj-pop-item:hover { background: var(--bg-subtle); }
.sb-proj-pop-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--t4); flex-shrink: 0; }
.sb-proj-pop-dot[data-on="true"] { background: var(--green); }
.sb-proj-pop-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Filter icon active state */
.sb-add.has-filter { color: var(--green); }

/* Inline filter row — lives inside the sidebar, never overflows outward */
.sb-filter-row {
  display: flex; align-items: center; gap: 6px;
  margin: 0 8px 6px;
  padding: 4px 8px;
  background: var(--sb-hover);
  border: 1px solid var(--sb-border);
  border-radius: 6px;
}
.sb-filter-row-ic { color: var(--sb-muted); flex-shrink: 0; }
.sb-filter-row input {
  flex: 1; min-width: 0;
  background: none; border: none; outline: none;
  font-size: 12px; color: var(--sb-fg);
}
.sb-filter-row input::placeholder { color: var(--sb-muted); }
.sb-filter-row-x {
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0;
  color: var(--sb-muted); flex-shrink: 0;
}
.sb-filter-row-x:hover { color: var(--sb-fg); }

/* Filter/group dropdown — fixed so it escapes the sidebar's overflow:hidden. */
.sb-filter-wrap { position: relative; display: flex; }
.sb-filter-pop {
  position: fixed; z-index: 2000;
  width: 208px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.22);
  padding: 8px; display: flex; flex-direction: column; gap: 10px;
}
.sb-filter-pop .sb-filter-row {
  margin: 0; background: var(--bg-subtle); border-color: var(--border);
}
.sb-filter-pop .sb-filter-row-ic { color: var(--t3); }
.sb-filter-pop .sb-filter-row input { color: var(--t1); }
.sb-filter-pop .sb-filter-row input::placeholder { color: var(--t3); }
.sb-filter-pop .sb-filter-row-x { color: var(--t3); }
.sb-filter-pop .sb-filter-row-x:hover { color: var(--t1); }
.sb-filter-grp { display: flex; flex-direction: column; gap: 6px; }
.sb-filter-lbl {
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--t3);
}
.sb-filter-seg { display: flex; gap: 4px; }
.sb-filter-seg-btn {
  flex: 1; font-size: 11.5px; padding: 5px 6px; border-radius: 5px; cursor: pointer;
  background: var(--bg-subtle); border: 1px solid transparent; color: var(--t2);
  display: inline-flex; align-items: center; justify-content: center; gap: 3px;
}
.sb-filter-seg-btn svg { flex-shrink: 0; }
.sb-filter-seg-btn:hover:not(:disabled) { color: var(--t1); }
.sb-filter-seg-btn:disabled { opacity: 0.4; cursor: default; }
.sb-filter-seg-btn.active {
  background: var(--accent, var(--primary)); color: var(--prim-fg, white); border-color: transparent;
}
.sb-filter-select { position: relative; }
.sb-filter-select-btn {
  display: flex; align-items: center; justify-content: space-between; gap: 6px; width: 100%;
  font-size: 12px; padding: 6px 8px; border-radius: 6px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border); color: var(--t1);
}
.sb-filter-select-btn:hover { border-color: var(--border-hi); }
.sb-filter-select-btn > svg { color: var(--t3); flex-shrink: 0; }
.sb-filter-select-btn.active { color: var(--t1); border-color: var(--border-hi); }
.sb-filter-menu {
  margin-top: 4px; max-height: 176px; overflow-y: auto;
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px;
}
.sb-filter-opt {
  display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t1);
  padding: 5px 6px; border-radius: 5px; cursor: pointer;
}
.sb-filter-opt:hover { background: var(--bg-subtle); }
.sb-filter-opt input { accent-color: var(--accent, var(--primary)); cursor: pointer; }
.sb-filter-foot { border-top: 1px solid var(--border); padding-top: 8px; }
.sb-filter-clear {
  display: flex; align-items: center; gap: 6px; width: 100%; justify-content: center;
  font-size: 12px; padding: 6px; border-radius: 6px; cursor: pointer;
  background: none; border: 1px solid transparent; color: var(--t2);
}
.sb-filter-clear:hover { color: var(--t1); background: var(--bg-subtle); }
.sb-filter-clear > svg { flex-shrink: 0; }

/* Group headers in the sandbox list (group-by project/agent). */
.sb-group + .sb-group { position: relative; margin-top: 6px; padding-top: 8px; }
.sb-group + .sb-group::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 1px; background: var(--sb-border);
}
.sb-group-hd {
  display: flex; align-items: center; gap: 6px; padding: 7px 10px 3px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--sb-muted);
}
.sb-group-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-group-count {
  margin-left: 2px; font-size: 10px; font-weight: 500; color: var(--sb-muted);
  background: var(--sb-active); border-radius: 9px; padding: 1px 6px; flex-shrink: 0;
}
/* Project group header: name + count + hover-reveal add button. */
.sb-group-add {
  width: 20px; height: 20px; flex-shrink: 0; margin-left: auto;
  display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--sb-muted); cursor: pointer;
  border-radius: 6px; opacity: 0; transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.sb-group.drag-over {
  background: color-mix(in srgb, var(--accent, var(--primary)) 9%, transparent);
  outline: 1px dashed color-mix(in srgb, var(--accent, var(--primary)) 55%, transparent);
  border-radius: 8px;
}
/* Group reorder: a crisp line marking the drop gap above/below the group,
   rather than illuminating the whole section. */
.sb-group.drop-before { box-shadow: inset 0 2px 0 var(--accent, var(--primary)); }
.sb-group.drop-after { box-shadow: inset 0 -2px 0 var(--accent, var(--primary)); }
.sb-group-hd:hover .sb-group-add { opacity: 0.7; }
.sb-group-add:hover { opacity: 1; background: var(--sb-active); color: var(--sb-fg); }
/* Shared-working-tree warning on a project header (sidebar + dashboard). */
.sb-group-warn { display: inline-flex; align-items: center; flex-shrink: 0; color: var(--yellow); }

/* First sidebar section (Sandboxes) — replaces the old Home band's top spacing. */
.sb-section-first { padding-top: 10px; }

/* Section header whose title navigates */
.sb-sec-head { display: flex; align-items: center; gap: 6px; padding: 0 8px 5px; }
.sb-sec-title {
  flex: 1; text-align: left;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--sb-muted); background: none; border: none; cursor: pointer; padding: 2px 0;
}
.sb-sec-title:hover { color: var(--sb-fg); }
.sb-sec-title.active { color: var(--sb-active-fg); }
.sb-sec-chev {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; margin-left: -2px; flex-shrink: 0;
  background: none; border: none; padding: 0; cursor: pointer; color: var(--sb-muted);
}
.sb-sec-chev:hover { color: var(--sb-fg); }

/* Project rows in the sidebar */
.sb-proj { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; margin-bottom: 1px; }
.sb-proj:hover { background: var(--sb-hover); }
.sb-proj-main { flex: 1; display: flex; align-items: center; gap: 8px; padding: 6px 8px; cursor: pointer; min-width: 0; }
/* Hover/click target = name + count only (icon = picker, + stays reachable). */
.sb-proj-label { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; min-width: 0; cursor: pointer; }
.sb-proj-top { display: flex; align-items: center; gap: 7px; min-width: 0; max-width: 100%; }

/* Customizable project avatar */
.sb-proj-av {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 7px; flex-shrink: 0;
  background: var(--sb-active); color: var(--sb-muted);
  transition: filter 0.1s;
}
.sb-proj-av:hover { filter: brightness(1.08); }

/* Project color picker popover */
.proj-cpick-scrim { position: fixed; inset: 0; z-index: 320; }
.proj-cpick {
  position: fixed; z-index: 330; width: 232px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25); padding: 10px;
}
.proj-cpick-lbl {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--t3); margin-bottom: 7px;
}
.proj-cpick-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 12px; }
.proj-cpick-sw {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; padding: 0; transition: transform 0.1s;
}
.proj-cpick-sw:hover { transform: scale(1.12); }
.proj-cpick-sw.on { border-color: var(--t1); }
.proj-cpick-icons { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.proj-cpick-icon {
  display: flex; align-items: center; justify-content: center;
  width: 100%; min-width: 0; aspect-ratio: 1; border-radius: 7px;
  background: var(--bg-subtle); border: 1px solid transparent; color: var(--t2);
  cursor: pointer; padding: 0;
}
.proj-cpick-icon:hover { border-color: var(--border-hi); }
.proj-cpick-icon.on { border-color: var(--t1); background: var(--bg); }
.proj-cpick-lblrow { display: flex; align-items: center; justify-content: space-between; }
.proj-cpick-more {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 6px; margin-bottom: 7px;
  background: transparent; border: 1px solid transparent; color: var(--t3);
  cursor: pointer; padding: 0;
}
.proj-cpick-more:hover { color: var(--t1); border-color: var(--border-hi); }
.proj-cpick-more.on { color: var(--t1); background: var(--bg-subtle); border-color: var(--border); }
.proj-cpick-more { position: relative; overflow: hidden; }
.proj-cpick-more input[type='color'] {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none; padding: 0; background: transparent;
}
.proj-cpick-browse { margin-top: 8px; }
.proj-cpick-search {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 7px; padding: 0 7px;
}
.proj-cpick-search-ic { color: var(--t3); flex-shrink: 0; }
.proj-cpick-search input {
  flex: 1; min-width: 0; border: none; background: transparent; color: var(--t1);
  font-size: 12px; padding: 6px 0; outline: none;
}
.proj-cpick-search-x {
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; color: var(--t3); cursor: pointer; padding: 2px;
}
.proj-cpick-search-x:hover { color: var(--t1); }
.proj-cpick-browse-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
  max-height: 220px; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable;
}
.proj-cpick-browse-empty { font-size: 12px; color: var(--t3); padding: 8px 2px; }
.proj-cpick-browse-more { font-size: 10.5px; color: var(--t3); margin-top: 8px; text-align: center; }
.proj-cpick-foot { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.proj-cpick-custom {
  width: 26px; height: 26px; border-radius: 50%; overflow: hidden; cursor: pointer; flex-shrink: 0;
  border: 1px solid var(--border);
  background: conic-gradient(#f43f5e, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6, #f43f5e);
}
.proj-cpick-custom input[type='color'] {
  width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0;
  -webkit-appearance: none; appearance: none; background: transparent;
}
.proj-cpick-reset {
  flex: 1; font-size: 12px; color: var(--t2); background: var(--bg-subtle);
  border: 1px solid var(--border); border-radius: 6px; padding: 5px; cursor: pointer;
}
.proj-cpick-reset:hover { color: var(--t1); border-color: var(--border-hi); }
.sb-proj-name { font-size: 12.5px; color: var(--sb-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-proj-count {
  font-size: 10px; color: var(--sb-muted); background: var(--sb-active);
  border-radius: 9px; padding: 1px 6px; flex-shrink: 0;
}
.sb-proj-branch {
  display: inline-flex; align-items: center; gap: 3px; max-width: 100%;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  font-size: 10px; color: var(--sb-muted);
}
.sb-proj-branch svg { flex-shrink: 0; opacity: 0.8; }
/* Git row in the project hover popover */
.sb-proj-pop-git {
  display: flex; align-items: center; gap: 6px; padding: 0 6px 7px;
  font-size: 11px; color: var(--t3);
}
.sb-proj-pop-git > svg { flex-shrink: 0; }
.sb-proj-pop-git-branch { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-proj-pop-git-remote {
  margin-left: auto; flex-shrink: 0; font-size: 11px; color: var(--accent, var(--primary));
  background: none; border: none; cursor: pointer; padding: 0;
}
.sb-proj-pop-git-remote:hover { text-decoration: underline; }
.sb-proj-add {
  width: 22px; height: 22px; flex-shrink: 0; margin-left: auto;
  display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--sb-muted); cursor: pointer;
  border-radius: 6px; opacity: 0.55; transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.sb-proj:hover .sb-proj-add { opacity: 1; }
.sb-proj-add:hover { background: var(--sb-active); color: var(--sb-fg); }

/* ── Collapsed sidebar ── */
.sidebar.collapsed { width: 56px; }
.sidebar.collapsed .sb-label,
.sidebar.collapsed .sb-item-body,
.sidebar.collapsed .sb-item-time,
.sidebar.collapsed .sb-new-label,
.sidebar.collapsed .sb-nav-label,
.sidebar.collapsed .sb-acct-info,
.sidebar.collapsed .sb-foot-text { display: none; }
.sidebar.collapsed .sb-item,
.sidebar.collapsed .sb-nav-item,
.sidebar.collapsed .sb-new,
.sidebar.collapsed .sb-acct { justify-content: center; gap: 0; }
.sidebar.collapsed .sb-foot { justify-content: center; }
.sidebar.collapsed .sb-head { justify-content: center; }

/* ── Content ── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

/* ── Detail ── */
.detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.detail-header {
  height: 45px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 9px;
}
/* Segmented action button (e.g. Stop | Restart) — two joined segments. */
/* Clone-mode "Changes" button + dropdown in the sandbox header. */
.d-feature-btn {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--border); border-radius: 7px;
  padding: 5px 9px; font-size: 12px; color: var(--t1);
  background: transparent; cursor: pointer;
}
.d-feature-btn:hover { background: var(--bg-subtle); }
.d-feature-btn svg { flex-shrink: 0; opacity: 0.85; }
.d-feature-menu {
  position: absolute; top: calc(100% + 5px); left: 0; z-index: 2000;
  min-width: 232px; padding: 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,0.22);
  color: var(--t1); font-size: 13px;
}
.d-feature-label { padding: 5px 9px 6px; font-size: 11px; color: var(--t3); }
.d-feature-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 9px; border-radius: 5px; cursor: pointer; white-space: nowrap;
}
.d-feature-item:hover { background: var(--bg-subtle); }
.d-feature-item svg { flex-shrink: 0; opacity: 0.85; }
.d-feature-sep { height: 1px; margin: 4px 6px; background: var(--border); }

.seg-btn { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; flex-shrink: 0; }
.seg-btn-item {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; font-family: inherit;
  padding: 4px 11px; background: var(--bg); color: var(--t1);
  border: none; cursor: pointer; transition: background 0.1s;
}
.seg-btn-item + .seg-btn-item { border-left: 1px solid var(--border); }
.seg-btn-item:hover { background: var(--bg-subtle); }
.seg-btn-item:disabled { opacity: 0.5; cursor: default; }

/* Workspace git summary row under the detail header. */
.detail-subhdr {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 6px 16px; border-bottom: 1px solid var(--border);
  font-size: 11.5px; color: var(--t3);
}
.detail-subhdr > svg { flex-shrink: 0; }
.ds-folder { color: var(--t2); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Clickable workspace folder — opens it in Finder; icon opens on hover. */
.ds-folder-btn {
  display: inline-flex; align-items: center; gap: 6px; min-width: 0;
  background: none; border: none; padding: 0; margin: 0;
  font: inherit; color: inherit; cursor: pointer;
}
.ds-folder-ico { flex-shrink: 0; }
.ds-folder-ico-open { display: none; }
.ds-folder-btn:hover .ds-folder-ico-closed { display: none; }
.ds-folder-btn:hover .ds-folder-ico-open { display: inline; }
.ds-folder-btn:hover { color: var(--t1); }
.ds-folder-btn:hover .ds-folder { color: var(--t1); }
/* The folder chip as a full-width bar pinned to the bottom of the Files panel.
   Defined after .ds-folder-btn so its background/height win over that base. */
.files-local {
  flex-shrink: 0; width: 100%; height: 34px; justify-content: flex-start;
  gap: 7px; padding: 0 12px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--t2); background: var(--bg-subtle);
}
.files-local:hover { background: var(--bg-muted); }
.ds-branch { display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
.ds-branch > svg { opacity: 0.7; }
.ds-changes-wrap { position: relative; flex-shrink: 0; }
.ds-changes {
  display: inline-flex; align-items: center; gap: 4px;
  font: inherit; font-size: 11.5px; color: var(--t2);
  background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 5px;
}
.ds-changes:hover, .ds-changes.open { background: var(--bg-subtle); color: var(--t1); }
.ds-changes > svg { opacity: 0.7; }
.ds-changes-menu {
  position: absolute; top: calc(100% + 5px); left: 0; z-index: 50;
  min-width: 260px; max-width: 380px;
  display: flex; flex-direction: column; max-height: min(360px, 70vh);
  background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.18); padding: 4px;
}
/* File list scrolls; the Review & merge link stays pinned as a footer. */
.ds-changes-scroll { overflow-y: auto; min-height: 0; }
.ds-remote { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; margin-left: auto; color: var(--t3); cursor: pointer; text-decoration: none; }
.ds-remote:hover { color: var(--accent, var(--primary)); }
.ds-remote > svg { opacity: 0.7; }

.d-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.d-dot.running { background: var(--green); animation: pulse 2s infinite; }
.d-dot.stopped { background: var(--border-hi); }

.d-name {
  font-size: 13.5px; font-weight: 600; color: var(--t1); letter-spacing: -0.015em;
  /* Truncate instead of pushing the actions (and kebab) past the panel edge. */
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.d-chip {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--t2);
  background: var(--bg-subtle);
  flex-shrink: 0;
  white-space: nowrap;
}
.d-uptime { font-size: 12px; color: var(--t3); flex-shrink: 0; white-space: nowrap; }
.d-status {
  display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
  font-size: 12px; color: var(--t3); white-space: nowrap;
}
.d-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--border-hi); }
.d-status.on::before { background: var(--green); }
/* Agent-activity states — match the sidebar/toolbar dots so the header agrees. */
.d-status.working::before { background: var(--yellow); animation: activity-pulse 1.3s ease-in-out infinite; }
.d-status.waiting::before { background: var(--blue); animation: activity-pulse 1.3s ease-in-out infinite; }
.d-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.d-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }
.d-back {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 9px 3px 5px; border-radius: 6px;
  font-size: 12.5px; font-weight: 500; color: var(--t2);
  background: var(--bg-subtle); border: 1px solid var(--border); cursor: pointer;
  margin-right: 4px;
}
.d-back:hover { color: var(--t1); border-color: var(--border-hi); }

/* ── Tabs ── */
.tabs {
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 16px;
  flex-shrink: 0;
}

.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 400;
  color: var(--t2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.12s;
}
.tab:hover { color: var(--t1); }
.tab.active { color: var(--t1); font-weight: 500; border-bottom-color: var(--t1); }

.tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-panel.active { display: flex; }

/* Terminal/Info icon switch (replaces tabs) */
.detail-switch { display: flex; gap: 3px; background: var(--bg-subtle); border-radius: 7px; padding: 3px; }
.detail-switch-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 11px; border: none; background: none; cursor: pointer;
  font-size: 12.5px; font-weight: 500; color: var(--t2); border-radius: 5px;
}
.detail-switch-item:hover:not(.active) { color: var(--t1); }
.detail-switch-item.active { background: var(--bg); color: var(--t1); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

/* Files side-panel drag handle */
.files-resize { width: 5px; flex-shrink: 0; cursor: col-resize; background: transparent; }
.files-resize:hover { background: var(--border-hi); }

/* Detail body + collapsible Files side panel */
.detail-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.detail-main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }
.files-side {
  width: 300px; flex-shrink: 0; display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: var(--bg); overflow: hidden;
}
.files-side .files-panel { flex: 1; min-height: 0; }

.tab-files-toggle {
  display: flex; align-items: center; gap: 5px; align-self: center;
  font-size: 12px; color: var(--t2); background: none; border: none; cursor: pointer;
  padding: 4px 8px; border-radius: 6px;
}
.tab-files-toggle:hover { color: var(--t1); background: var(--bg-subtle); }
.tab-files-toggle.active { color: var(--t1); }

/* ── Terminal ── */
/* --tbg / --tfg are set inline from the active terminal theme so the chrome
   (bar, padding, segments) matches the picked theme instead of staying black. */
.term {
  flex: 1; display: flex; flex-direction: column;
  background: var(--tbg, #0a0a0a);
  --tline: color-mix(in srgb, var(--tfg, #fff) 10%, transparent);
  overflow: hidden; position: relative;
}

/* Drag-and-drop overlay shown while dragging a file over the agent terminal */
/* Matches the file-panel drop affordance (.files-body.drop-active): accent
   dashed border + faint accent tint, so both drop targets read the same. */
.term-drop {
  position: absolute; inset: 6px;
  display: flex; align-items: center; justify-content: center;
  border: 2px dashed var(--primary);
  border-radius: 8px; pointer-events: none; z-index: 5;
  background: color-mix(in srgb, var(--primary) 14%, color-mix(in srgb, var(--tbg, #000) 70%, transparent));
}
.term-drop span {
  padding: 6px 12px; border-radius: 6px;
  font-size: 12.5px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--primary);
  background: color-mix(in srgb, var(--primary) 16%, var(--tbg, #111));
}

.term-bar {
  height: 40px;
  background: var(--tbg, #111);
  border-bottom: 1px solid var(--tline);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
}

.term-seg {
  display: flex;
  gap: 1px;
  background: color-mix(in srgb, var(--tfg, #fff) 7%, transparent);
  border-radius: 5px;
  padding: 2px;
}
.term-seg-item {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11.5px;
  font-weight: 500;
  color: color-mix(in srgb, var(--tfg, #fff) 42%, transparent);
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}
.term-seg-item.active {
  background: color-mix(in srgb, var(--tfg, #fff) 12%, transparent);
  color: var(--tfg, #fff);
}

.term-actions { margin-left: auto; display: flex; align-items: center; gap: 5px; }

.term-right { margin-left: auto; display: flex; align-items: center; gap: 3px; }
.term-files {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 5px;
  font-size: 11.5px; font-weight: 500;
  color: color-mix(in srgb, var(--tfg, #fff) 55%, transparent);
  background: none; border: none; cursor: pointer;
}
.term-files:hover { color: var(--tfg, #fff); background: color-mix(in srgb, var(--tfg, #fff) 8%, transparent); }
.term-files.active { color: var(--tfg, #fff); background: color-mix(in srgb, var(--tfg, #fff) 12%, transparent); }
/* Full-opacity red so the warning reads clearly (not faded like the others). */
.term-warn { color: var(--destruct); padding: 4px 6px; }
.term-warn:hover { color: var(--destruct); background: color-mix(in srgb, var(--destruct) 14%, transparent); }

.term-theme-select {
  appearance: none;
  -webkit-appearance: none;
  background-color: color-mix(in srgb, var(--tfg, #fff) 7%, transparent);
  color: color-mix(in srgb, var(--tfg, #fff) 72%, transparent);
  border: 1px solid color-mix(in srgb, var(--tfg, #fff) 12%, transparent);
  border-radius: 5px;
  font-size: 11.5px;
  font-weight: 500;
  padding: 3px 22px 3px 9px;
  cursor: pointer;
  outline: none;
  /* neutral-gray chevron reads on both light and dark themes */
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='gray' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat: no-repeat;
  background-position: right 7px center;
}
.term-theme-select:hover {
  color: var(--tfg, #fff);
  border-color: color-mix(in srgb, var(--tfg, #fff) 22%, transparent);
}
.term-theme-select option { background: var(--tbg, #1a1a1a); color: var(--tfg, #e0e0e0); }

.t-btn {
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 11.5px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.12s;
}
.t-btn-ghost { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); }
.t-btn-ghost:hover { background: rgba(255,255,255,0.11); color: rgba(255,255,255,0.75); }
.t-btn-stop { background: rgba(239,68,68,0.12); color: rgba(239,68,68,0.8); }
.t-btn-stop:hover { background: rgba(239,68,68,0.2); }

.term-body {
  flex: 1;
  padding: 12px 16px;
  font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
  font-size: 12.5px;
  line-height: 1.8;
  overflow-y: auto;
  color: rgba(255,255,255,0.78);
}

.tr { display: flex; gap: 14px; }
.tt { color: rgba(255,255,255,0.2); flex-shrink: 0; user-select: none; }
.log-success { color: #4ade80; }
.log-info    { color: #60a5fa; }
.log-command { color: rgba(255,255,255,0.38); }
.log-error   { color: #f87171; }
.log-prompt  { color: rgba(96,165,250,0.5); }

.cursor {
  display: inline-block;
  width: 7px;
  height: 13px;
  background: rgba(255,255,255,0.7);
  animation: blink 1.1s infinite;
  vertical-align: text-bottom;
}

/* ── Info ── */
/* Info as a right-side dock */
.info-dock { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.info-dock-hd {
  flex-shrink: 0; height: 40px; display: flex; align-items: center;
  padding: 0 10px 0 14px; border-bottom: 1px solid var(--border);
}
.info-dock-title { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.info-dock-x {
  margin-left: auto; display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  background: none; border: none; color: var(--t3); cursor: pointer;
}
.info-dock-x:hover { background: var(--bg-subtle); color: var(--t1); }

.info-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; }

/* Compact label/value rows (replaces the bulky stat cards) */
/* Compact 2-column stats — no box, no dividers (less vertical space). */
.info-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 15px 16px;
  margin: 4px 0 20px;
}
.info-stat { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.is-k {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--t3);
}
.is-v {
  font-size: 13px; font-weight: 500; color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
}
.is-agent { display: inline-flex; align-items: center; gap: 5px; }
.is-sub { font-weight: 400; color: var(--t3); }

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(124px, 1fr));
  gap: 8px;
  margin-bottom: 18px;
}
.info-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 13px;
}
.ic-label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--t3);
  margin-bottom: 8px;
}
.ic-val { font-size: 17px; font-weight: 600; color: var(--t1); letter-spacing: -0.02em; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; }
.ic-sub { font-size: 11px; color: var(--t3); margin-top: 4px; }

.info-block { margin-bottom: 18px; }
.info-block-title { font-size: 12.5px; font-weight: 600; color: var(--t1); margin-bottom: 8px; }

.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 5px;
}
.ir-label { font-size: 13px; color: var(--t1); }
.ir-val { font-size: 12px; color: var(--t2); font-family: 'SF Mono','Menlo',monospace; }
/* Stacked variant: label on its own line, value (e.g. a long path) below it. */
.info-row-stack { flex-direction: column; align-items: stretch; gap: 3px; }
.info-row-stack .ir-label { color: var(--t3); font-size: 11px; }
.info-row-stack .ir-val { word-break: break-all; line-height: 1.4; }

/* Network policy block */
.info-kits { display: flex; flex-wrap: wrap; gap: 6px; }
.info-kit { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--t1); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 100px; padding: 3px 10px; }
.info-kit svg { color: var(--t3); }

.np-empty { font-size: 12.5px; color: var(--t2); padding: 4px 0; }
.np-meta {
  display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center;
  font-size: 11.5px; color: var(--t3); margin-bottom: 8px;
}
.np-gov { color: var(--t2); }
.np-gov-note {
  display: flex; gap: 8px; align-items: flex-start;
  font-size: 11.5px; line-height: 1.45; color: var(--t2);
  border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent);
  background: color-mix(in srgb, var(--yellow) 10%, transparent);
  border-radius: var(--radius); padding: 9px 11px; margin-bottom: 12px;
}
.np-gov-ic { color: var(--yellow); flex-shrink: 0; margin-top: 1px; }
.np-gov-note strong { color: var(--t1); font-weight: 600; }
.np-rules { display: flex; flex-direction: column; gap: 7px; }
.np-rule { border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px; }
.np-rule-hd { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.np-dec {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  padding: 2px 7px; border-radius: 100px; flex-shrink: 0;
}
.np-dec-allow { background: var(--green-dim); color: var(--green); }
.np-dec-deny { background: color-mix(in srgb, var(--destruct) 16%, transparent); color: var(--destruct); }
.np-rule-name { font-size: 12.5px; font-weight: 500; color: var(--t1); }
.np-scope { font-size: 11px; color: var(--t3); margin-left: auto; }
.np-res { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.np-chip {
  font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2);
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: 5px; padding: 2px 7px;
}
.np-note { font-size: 11.5px; color: var(--t3); margin-top: 10px; line-height: 1.45; }
.np-add-box { margin-top: 14px; }
.np-add-lbl {
  display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.4px; color: var(--t3); margin-bottom: 7px;
}
.np-add { display: flex; gap: 7px; }
.np-add-input {
  flex: 1; min-width: 0;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 9px; color: var(--t1); outline: none;
}
.np-add-input:focus { border-color: var(--border-hi); }
/* Default-preset control — sits above the rules, shown as a segmented picker.
   A bottom border separates it from the rule cards below. */
.np-preset { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.np-preset-lbl {
  display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.4px; color: var(--t3); margin-bottom: 7px;
}
.np-seg { display: flex; flex-wrap: wrap; gap: 6px; }
.np-seg-opt {
  flex: 1 1 92px; min-width: 92px; display: flex; flex-direction: column; gap: 3px; align-items: flex-start;
  font: inherit; text-align: left; padding: 9px 10px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--t2); transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
}
.np-seg-opt:hover { border-color: var(--border-hi); background: var(--bg-subtle); }
.np-seg-opt.on {
  border-color: var(--accent, var(--primary)); color: var(--t1);
  box-shadow: 0 0 0 1px var(--accent, var(--primary));
}
.np-seg-ic { color: var(--t3); flex-shrink: 0; }
.np-seg-opt.on .np-seg-ic { color: var(--accent, var(--primary)); }
.np-seg-l { font-size: 12px; font-weight: 600; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
.np-seg-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.np-seg-s { font-size: 10px; color: var(--t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
/* Preview of a not-yet-applied preset. */
.np-preview {
  margin-top: 9px; padding: 9px 11px; border: 1px dashed var(--border); border-radius: var(--radius);
  background: var(--bg-subtle);
}
.np-preview-hd { font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 5px; }
.np-preview-line { font-size: 11.5px; color: var(--t1); line-height: 1.5; padding-left: 12px; position: relative; }
.np-preview-line::before { content: '·'; position: absolute; left: 3px; color: var(--t3); }
.np-preview-note { font-size: 10.5px; color: var(--t3); margin-top: 6px; line-height: 1.4; }
.np-preset-actions { display: flex; align-items: center; justify-content: flex-end; margin-top: 9px; }
/* "+ Add rule" CTA — right-aligned secondary button; Apply sits next to it. */
.np-add-cta { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
/* Add-rule form: a draft "fake card" (dashed) — decision segmented control,
   then a full-width URL, then actions. Sits above the + Add rule / Apply row. */
.np-add-form { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
.np-rule-draft { border-style: dashed; margin-bottom: 8px; }
.np-dec-seg {
  display: inline-flex; align-self: flex-start; gap: 2px;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 6px; padding: 2px;
}
.np-dec-opt {
  display: inline-flex; align-items: center; gap: 5px;
  font: inherit; font-size: 12px; padding: 4px 12px;
  border: none; background: none; color: var(--t2); border-radius: 4px; cursor: pointer;
}
.np-dec-opt:hover { color: var(--t1); }
.np-dec-opt.on { background: var(--bg); color: var(--t1); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.np-dec-ic-allow { color: var(--green); }
.np-dec-ic-block { color: var(--destruct); }
.np-add-form-actions { display: flex; justify-content: flex-end; gap: 7px; }
.np-rule-pending { border-style: dashed; }
.np-pending-x {
  margin-left: auto; background: none; border: none; cursor: pointer;
  color: var(--t3); font-size: 15px; line-height: 1; padding: 0 2px;
}
.np-pending-x:hover { color: var(--t1); }

.np-banner {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px; padding: 8px 10px;
  border-radius: var(--radius); font-size: 12px; line-height: 1.4;
  border: 1px solid var(--border);
}
.np-banner-txt { flex: 1; }
.np-banner .btn { flex-shrink: 0; }
.np-banner.ok   { color: var(--t1); background: var(--green-dim); border-color: color-mix(in srgb, var(--green) 30%, var(--border)); }
.np-banner.err  { color: var(--t1); background: color-mix(in srgb, var(--destruct) 10%, transparent); border-color: color-mix(in srgb, var(--destruct) 30%, var(--border)); }
.np-banner.warn { color: var(--t2); background: color-mix(in srgb, var(--yellow) 12%, transparent); border-color: color-mix(in srgb, var(--yellow) 32%, var(--border)); }

.info-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* ── Ports ── */
/* Compact ports — fits the narrow Info dock */
.ports-empty {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-size: 12.5px; color: var(--t3);
}
.ports-list { display: flex; flex-direction: column; }
.port-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.port-row:last-of-type { border-bottom: none; }
.p-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t4); flex-shrink: 0; }
.p-dot.on { background: var(--green); }
.port-map { font-size: 12.5px; color: var(--t1); font-family: 'SF Mono','Menlo',monospace; }
.port-proto { font-size: 11px; color: var(--t3); }
.ports-add { align-self: flex-end; margin: 12px 0; }
/* Add-port form — full width; inputs fill the row, actions split Cancel/Open. */
.ports-add-form { display: flex; flex-direction: column; gap: 8px; padding: 6px 0; }
.ports-add-row { display: flex; align-items: center; gap: 6px; }
.pf-port { flex: 1; min-width: 0; }
.pf-arrow { opacity: 0.5; flex-shrink: 0; }
.pf-proto { flex: 0 0 auto; width: 72px; cursor: pointer; }
.pf-expose { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; color: var(--t2); }
.pf-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.pf-btns { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

/* Runtime mounts (sbx mount) — in the Workspaces section. */
.mounts { display: flex; flex-direction: column; margin-top: 8px; }
.mount-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.mount-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.mount-host { font-size: 12px; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mount-target { font-size: 10.5px; color: var(--t3); font-family: 'SF Mono','Menlo',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mounts-add { align-self: flex-end; margin: 10px 0 4px; }
.mount-add { display: flex; flex-direction: column; gap: 7px; padding: 8px 0; }
.mount-pick { align-self: flex-start; }
.mount-host-full { font-size: 10.5px; color: var(--t3); font-family: 'SF Mono','Menlo',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mount-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.mount-ro { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--t2); cursor: pointer; }
.mount-actions-btns { display: flex; gap: 7px; }
.mounts-hint { font-size: 11px; color: var(--t3); margin-top: 6px; line-height: 1.4; }
.ports-hint { font-size: 11px; color: var(--t3); margin-top: 6px; }

/* ── Files ── */
.files-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.files-bar {
  height: 36px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
}
.files-path {
  font-size: 12px;
  color: var(--t2);
  font-family: 'SF Mono','Menlo',monospace;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Breadcrumb: sandbox chip (left, opens a path dropdown) + a middle-ellipsised
   trail. No overflow scroll here — an ancestor with overflow would clip the
   absolutely-positioned dropdown. */
.files-crumbs {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.files-crumb-wrap { display: inline-flex; align-items: center; min-width: 0; flex-shrink: 0; }
/* Only the current (last) folder truncates, so a long name shows an ellipsis
   instead of running under the toolbar buttons; ancestors stay intact. */
.files-crumbs > .files-crumb-wrap:last-child { flex: 0 1 auto; min-width: 0; }
.files-crumbs > .files-crumb-wrap:last-child > .files-crumb {
  display: block;
  min-width: 0;
  flex-shrink: 1; /* override the base .files-crumb flex-shrink:0 so it can truncate */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.files-crumb {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--t2);
  font-family: 'SF Mono','Menlo',monospace;
}
.files-crumb:hover:not(:disabled) { background: var(--bg-subtle); color: var(--t1); }
.files-crumb:disabled { cursor: default; color: var(--t1); font-weight: 500; }
/* Sandbox identity chip anchoring the breadcrumb — makes it unmistakable that
   the tree is the sandbox container's filesystem, not the host. */
.files-sbx { position: relative; flex-shrink: 0; display: inline-flex; }
.files-crumb-sandbox {
  flex-shrink: 0;
  gap: 3px;
  background: var(--bg-subtle);
  color: var(--t1);
}
.files-crumb-sandbox:hover,
.files-crumb-sandbox.open { background: var(--sb-hover, var(--bg-subtle)); color: var(--t1); }
.files-crumb-ellipsis { letter-spacing: 1px; }
.files-crumb-sep { color: var(--t3); flex-shrink: 0; }

/* Path dropdown anchored under the sandbox chip. */
.files-path-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  z-index: 50;
  min-width: 200px;
  max-width: 340px;
  max-height: 320px;
  overflow-y: auto;
  padding: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
}
.files-path-menu-item {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 5px 10px;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--t1);
  text-align: left;
  font-family: 'SF Mono','Menlo',monospace;
}
.files-path-menu-item:hover { background: var(--bg-subtle); }
.files-path-menu-item.at { color: var(--primary); font-weight: 500; }
.files-path-menu-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.files-path-menu-root { width: 12px; text-align: center; color: var(--t3); flex-shrink: 0; }
.btn.at-home { color: var(--primary); }

.files-bar > .btn { flex-shrink: 0; }
.files-body { flex: 1; overflow-y: auto; }
/* Drag-to-copy affordance — centered overlay below the bar, matching the
   terminal's .term-drop so both drop targets look and read the same. */
.files-drop-overlay {
  position: absolute;
  inset: 37px 0 0 0;
  z-index: 10;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px dashed var(--primary);
  background: color-mix(in srgb, var(--primary) 8%, var(--bg));
}
.files-drop-overlay span {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--primary);
  background: color-mix(in srgb, var(--primary) 16%, var(--bg));
}
.files-empty { text-align: center; color: var(--t3); font-size: 13px; padding: 32px 16px; }

/* Files | Changes tab bar */
.files-tabs { display: flex; align-items: center; gap: 2px; height: 40px; padding: 0 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.files-tab {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; font-family: inherit;
  padding: 4px 10px; border: none; border-radius: 6px; background: none; color: var(--t3); cursor: pointer;
}
.files-tab:hover { color: var(--t1); background: var(--bg-subtle); }
.files-tab.on { color: var(--t1); background: var(--bg-subtle); }
.files-tab-badge {
  font-size: 10px; font-weight: 600; color: var(--t2);
  background: var(--bg-muted); border-radius: 100px; padding: 0 6px; min-width: 16px; text-align: center;
}

/* Changes list (Files-panel tab + subheader dropdown) */
.files-changes { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.changes-list { display: flex; flex-direction: column; }
.changes-row {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 5px 8px; border: none; background: none; cursor: pointer; border-radius: 6px;
  font: inherit; text-align: left; color: var(--t1);
}
.changes-row:hover { background: var(--bg-subtle); }
.changes-row.static { cursor: default; }
.changes-row.static:hover { background: none; }
.changes-check {
  flex-shrink: 0; width: 15px; height: 15px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--bg);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff; cursor: pointer;
}
.changes-check:hover { border-color: var(--t2); }
.changes-check.on { background: var(--primary); border-color: var(--primary); }
.changes-name { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; max-width: 55%; }
.changes-dir { font-size: 11px; color: var(--t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; flex: 1; min-width: 0; }
.changes-tag { font-size: 10px; font-weight: 700; font-family: 'SF Mono','Menlo',monospace; flex-shrink: 0; margin-left: auto; }
.changes-empty { text-align: center; color: var(--t3); font-size: 13px; padding: 28px 16px; }
.changes-stat { font-family: 'SF Mono','Menlo',monospace; font-size: 10.5px; flex-shrink: 0; white-space: nowrap; }
.changes-add { color: var(--green); }
.changes-del { color: var(--destruct); }
.changes-bin { color: var(--t3); }

/* Review surface (Changes tab): scrollable file list + fixed action bar. */
.changes-review { display: flex; flex-direction: column; flex: 1; min-height: 0; }
.changes-scroll { flex: 1; min-height: 0; overflow: auto; padding: 4px; }
.changes-actions {
  flex-shrink: 0; position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--border); background: var(--bg);
  display: flex; flex-direction: column;
}
/* Single toolbar row — same height as the Files-tab bar (.files-bar). */
.ca-bar {
  height: 36px; flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  padding: 0 10px; font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px;
}
.ca-bar-spacer { flex: 1; }
.ca-branch {
  font-family: 'SF Mono','Menlo',monospace; font-size: 10.5px; color: var(--t2);
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;
}
.ca-delete { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--t2); cursor: pointer; white-space: nowrap; }
.ca-prform { display: flex; flex-direction: column; gap: 5px; padding: 4px 10px 10px; }
.ca-prform .flabel { margin-bottom: 0; }
.ca-body { resize: vertical; font-family: 'SF Mono','Menlo',monospace; font-size: 12px; }
.ca-prform-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 2px; }
.ca-pr { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--t1); padding: 6px 10px 10px; }
.ca-pr-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ca-commit-note { font-size: 11px; color: var(--t3); line-height: 1.4; }
.ca-msg { font-size: 11.5px; padding: 0 10px 8px; }
.ca-msg.ok { color: var(--green); }
.ca-msg.err { color: var(--destruct); }

/* Header changes dropdown → link into the Changes panel. */
.ds-changes-link {
  display: block; width: 100%; text-align: left; flex-shrink: 0;
  font: inherit; font-size: 11.5px; color: var(--t2);
  background: none; border: none; border-top: 1px solid var(--border);
  padding: 8px 10px; margin-top: 4px; cursor: pointer;
}
.ds-changes-link:hover { background: var(--bg-subtle); color: var(--t1); }
.files-footer {
  height: 30px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 10px;
}
.files-footer-spacer { flex: 1; }
.files-branch {
  display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0;
  max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  font-size: 11px; color: var(--t2);
}
.files-branch svg { flex-shrink: 0; opacity: 0.8; }
.files-chg-count { font-size: 10.5px; color: var(--yellow); flex-shrink: 0; white-space: nowrap; }
.files-remote {
  display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
  font-size: 11px; color: var(--t2);
  background: none; border: none; cursor: pointer; padding: 2px 4px;
  border-radius: 4px;
}
.files-remote:hover { color: var(--t1); background: var(--bg-subtle); }
.files-remote svg { flex-shrink: 0; opacity: 0.8; }
.frow-badge {
  flex-shrink: 0; font-size: 9px; font-weight: 700; min-width: 14px; text-align: center;
  border-radius: 3px; padding: 0 3px; margin-left: 4px;
}
/* Folder roll-up count: a pill, so it reads as "N changes in here" rather than
   a single-letter file status. */
.frow-badge-count { border-radius: 100px; min-width: 16px; padding: 0 5px; }

/* File editor window (#/editor) */
.few { display: flex; flex-direction: column; height: 100vh; background: var(--bg); }
.few-bar {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.few-name { font-size: 13px; font-weight: 600; color: var(--t1); flex-shrink: 0; }
.few-path {
  font-size: 11px; color: var(--t3); font-family: 'SF Mono','Menlo',monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.few-msg { padding: 24px; color: var(--t3); font-size: 13px; }
.few-editor {
  flex: 1; width: 100%; resize: none; border: none; outline: none;
  background: var(--bg); color: var(--t1); padding: 14px;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12.5px; line-height: 1.5;
}

/* Editable code with a synced line-number gutter (Edit tab). */
.fp-edit-wrap { flex: 1; display: flex; min-height: 0; }
.fp-edit-gutter { overflow: hidden; }             /* scrolled in sync via JS */
.fp-edit-ta {
  flex: 1; padding-left: 12px; line-height: 1.55; /* match the gutter's line-height */
  white-space: pre; overflow: auto;
}

/* ── Previewer (multi-format) ─────────────────────────────────────────── */
.fp-body { flex: 1; min-height: 0; overflow: auto; }

/* Segmented tabs in the toolbar (Preview / Edit / Code / Source). */
.fp-tabs {
  display: flex; gap: 2px; flex-shrink: 0;
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px;
}
.fp-tab {
  display: inline-flex; align-items: center; gap: 4px;
  font: inherit; font-size: 11.5px; padding: 3px 9px;
  border: none; background: none; color: var(--t2);
  border-radius: 4px; cursor: pointer; transition: background 0.1s, color 0.1s;
}
.fp-tab:hover { color: var(--t1); }
.fp-tab.on { background: var(--bg); color: var(--t1); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

/* Diff tab with an embedded layout dropdown (chevron shows when active). */
.fp-tab-wrap { position: relative; display: inline-flex; }
.fp-tab-chev { color: var(--t3); margin-left: 1px; }
.fp-tab-menu {
  position: absolute; top: calc(100% + 5px); right: 0; z-index: 3000;
  min-width: 150px; padding: 5px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
}
.fp-tab-menu-item {
  width: 100%; display: flex; align-items: center; gap: 8px;
  font: inherit; font-size: 12.5px; text-align: left; color: var(--t1);
  background: none; border: none; padding: 7px 8px; border-radius: 5px; cursor: pointer;
}
.fp-tab-menu-item:hover { background: var(--bg-subtle); }
.fp-tab-menu-check { margin-left: auto; color: var(--accent, var(--blue)); }

/* Code viewer (read-only, highlighted) with a line-number gutter. */
.fp-code-wrap { display: flex; align-items: stretch; min-width: min-content; }
.fp-gutter {
  flex-shrink: 0; position: sticky; left: 0; z-index: 1;
  margin: 0; padding: 14px 10px; text-align: right; user-select: none;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12.5px; line-height: 1.55;
  color: var(--t3); background: var(--bg-muted); white-space: pre;
  border-right: 1px solid var(--border);
}
.fp-code {
  flex: 1; margin: 0; padding: 14px 16px; white-space: pre;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12.5px; line-height: 1.55;
  color: var(--t1); background: var(--bg);
}

/* Image preview — centered on a subtle checkerboard so transparency reads. */
.fp-img {
  display: flex; align-items: center; justify-content: center; padding: 24px;
  background-color: var(--bg);
  background-image:
    linear-gradient(45deg, var(--bg-subtle) 25%, transparent 25%),
    linear-gradient(-45deg, var(--bg-subtle) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--bg-subtle) 75%),
    linear-gradient(-45deg, transparent 75%, var(--bg-subtle) 75%);
  background-size: 18px 18px;
  background-position: 0 0, 0 9px, 9px -9px, -9px 0;
}
.fp-img-el { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }

/* Side-by-side diff view (Diff tab): old on the left, new on the right. A 4-col
   grid (num | code | num | code) keeps each logical row's two sides aligned. */
.fp-sbs {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr);
  align-items: stretch;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12.5px; line-height: 1.55;
  color: var(--t1); background: var(--bg);
}
.fp-sbs-row { display: contents; }
.fp-sbs-hunk {
  grid-column: 1 / -1; padding: 3px 14px;
  color: var(--accent, var(--blue)); background: var(--bg-subtle);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.fp-sbs-num {
  text-align: right; padding: 0 8px; color: var(--t3); user-select: none;
  white-space: nowrap; min-width: 34px;
}
.fp-sbs-code { padding: 0 10px; white-space: pre-wrap; word-break: break-word; }
/* The 3rd column (right side's number) carries the divider between the two panes. */
.fp-sbs-num:nth-child(3) { border-left: 1px solid var(--border); }
.fp-sbs-code.del, .fp-sbs-num.del { background: rgba(239,68,68,0.14); }
.fp-sbs-code.add, .fp-sbs-num.add { background: rgba(34,197,94,0.14); }
.fp-sbs-code.empty, .fp-sbs-num.empty { background: var(--bg-subtle); }
[data-theme="dark"] .fp-sbs-code.del, [data-theme="dark"] .fp-sbs-num.del { background: rgba(248,81,73,0.18); }
[data-theme="dark"] .fp-sbs-code.add, [data-theme="dark"] .fp-sbs-num.add { background: rgba(63,185,80,0.18); }

/* Inline (unified) diff view (Diff tab, inline layout). */
.fp-diff {
  margin: 0; padding: 8px 0; min-width: min-content;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12.5px; line-height: 1.5;
  color: var(--t1); background: var(--bg);
}
.fp-diff-line { padding: 0 14px; white-space: pre; }
