.fp-diff-line.d-hunk { color: var(--accent, var(--blue)); background: var(--bg-subtle); }
.fp-diff-line.d-meta { color: var(--t3); }
[data-theme="dark"] .fp-diff-line.d-add { background: rgba(63,185,80,0.18); }
[data-theme="dark"] .fp-diff-line.d-del { background: rgba(248,81,73,0.18); }

/* HTML preview — sandboxed iframe on white (pages assume a light canvas). */
.fp-html { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.fp-html-bar {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 6px 12px; font-size: 12px; color: var(--t2);
  background: var(--bg-subtle); border-bottom: 1px solid var(--border);
}
.fp-iframe { flex: 1; min-height: 0; width: 100%; border: none; background: #fff; }

/* Markdown image states. */
.md-img-loading { display: inline-block; width: 16px; height: 16px; }
.md-img-missing { color: var(--t3); font-size: 12.5px; }

/* Binary / can't-preview fallback. */
.fp-binary {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 40px; text-align: center; color: var(--t3);
}
.fp-binary-title { font-size: 14px; font-weight: 600; color: var(--t1); }
.fp-binary-sub { font-size: 12.5px; color: var(--t3); max-width: 360px; line-height: 1.5; }
.fp-binary-actions { display: flex; gap: 8px; margin-top: 8px; }

/* Rendered markdown — follows the app theme via CSS vars. */
.md-body { padding: 22px 26px; color: var(--t1); font-size: 14px; line-height: 1.65; overflow-wrap: break-word; }
.md-body > *:first-child { margin-top: 0; }
.md-body h1, .md-body h2, .md-body h3, .md-body h4 { color: var(--t1); font-weight: 600; line-height: 1.3; margin: 1.4em 0 0.6em; }
.md-body h1 { font-size: 1.7em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
.md-body h2 { font-size: 1.35em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
.md-body h3 { font-size: 1.15em; }
.md-body p, .md-body ul, .md-body ol, .md-body blockquote, .md-body table, .md-body pre { margin: 0 0 1em; }
.md-body ul, .md-body ol { padding-left: 1.6em; }
.md-body li { margin: 0.25em 0; }
.md-body a { color: var(--accent, var(--blue)); text-decoration: none; cursor: pointer; }
.md-body a:hover { text-decoration: underline; }
.md-body code {
  font-family: 'SF Mono','Menlo',monospace; font-size: 0.88em;
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: 4px; padding: 0.12em 0.4em;
}
.md-body pre {
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; overflow: auto;
}
.md-body pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.55; }
.md-body blockquote {
  color: var(--t2); border-left: 3px solid var(--border);
  padding: 0.2em 0 0.2em 1em; margin-left: 0;
}
.md-body table { border-collapse: collapse; display: block; overflow: auto; }
.md-body th, .md-body td { border: 1px solid var(--border); padding: 6px 12px; }
.md-body th { background: var(--bg-subtle); font-weight: 600; }
.md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.md-body img { max-width: 100%; height: auto; }
.md-body input[type="checkbox"] { margin-right: 0.5em; }

/* ── Syntax highlighting palette (highlight.js token classes) ──────────────
   Defined for light (default) and dark; used by both the code viewer and
   markdown code blocks (rehype-highlight emits the same .hljs-* classes). */
.hljs { color: var(--t1); background: transparent; }
.hljs-comment, .hljs-quote { color: #6a737d; font-style: italic; }
.hljs-keyword, .hljs-selector-tag, .hljs-doctag, .hljs-formula { color: #d73a49; }
.hljs-string, .hljs-regexp, .hljs-addition, .hljs-meta .hljs-string { color: #032f62; }
.hljs-number, .hljs-literal, .hljs-symbol, .hljs-bullet, .hljs-link { color: #005cc5; }
.hljs-title, .hljs-section, .hljs-name, .hljs-selector-id, .hljs-selector-class, .hljs-title.function_ { color: #6f42c1; }
.hljs-attr, .hljs-attribute, .hljs-variable, .hljs-template-variable, .hljs-class .hljs-title { color: #e36209; }
.hljs-built_in, .hljs-type, .hljs-builtin-name, .hljs-params { color: #005cc5; }
.hljs-meta, .hljs-tag { color: #22863a; }
.hljs-deletion { color: #b31d28; }
.hljs-emphasis { font-style: italic; }
.hljs-strong { font-weight: 700; }

[data-theme="dark"] .hljs-comment, [data-theme="dark"] .hljs-quote { color: #8b949e; }
[data-theme="dark"] .hljs-keyword, [data-theme="dark"] .hljs-selector-tag, [data-theme="dark"] .hljs-doctag, [data-theme="dark"] .hljs-formula { color: #ff7b72; }
[data-theme="dark"] .hljs-string, [data-theme="dark"] .hljs-regexp, [data-theme="dark"] .hljs-addition, [data-theme="dark"] .hljs-meta .hljs-string { color: #a5d6ff; }
[data-theme="dark"] .hljs-number, [data-theme="dark"] .hljs-literal, [data-theme="dark"] .hljs-symbol, [data-theme="dark"] .hljs-bullet, [data-theme="dark"] .hljs-link { color: #79c0ff; }
[data-theme="dark"] .hljs-title, [data-theme="dark"] .hljs-section, [data-theme="dark"] .hljs-name, [data-theme="dark"] .hljs-selector-id, [data-theme="dark"] .hljs-selector-class, [data-theme="dark"] .hljs-title.function_ { color: #d2a8ff; }
[data-theme="dark"] .hljs-attr, [data-theme="dark"] .hljs-attribute, [data-theme="dark"] .hljs-variable, [data-theme="dark"] .hljs-template-variable, [data-theme="dark"] .hljs-class .hljs-title { color: #ffa657; }
[data-theme="dark"] .hljs-built_in, [data-theme="dark"] .hljs-type, [data-theme="dark"] .hljs-builtin-name, [data-theme="dark"] .hljs-params { color: #ffa657; }
[data-theme="dark"] .hljs-meta, [data-theme="dark"] .hljs-tag { color: #7ee787; }
[data-theme="dark"] .hljs-deletion { color: #ffa198; }

/* File viewer / editor (legacy inline; kept for reference) */
.fv { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.fv-bar {
  height: 36px; flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  padding: 0 8px; border-bottom: 1px solid var(--border);
}
.fv-back {
  width: 24px; height: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--t2); cursor: pointer; border-radius: 6px;
}
.fv-back:hover { background: var(--bg-subtle); color: var(--t1); }
.fv-name { flex: 1; font-size: 12.5px; font-weight: 500; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fv-editor {
  flex: 1; min-height: 0; width: 100%; resize: none; border: none; outline: none;
  background: #0a0a0a; color: #d4d4d4; padding: 12px;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12px; line-height: 1.5;
}

/* Files / Changes segmented toggle */
.files-seg { display: flex; gap: 3px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.files-seg-item {
  flex: 1; padding: 5px 0; border: none; background: none; cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--t2); border-radius: 5px;
}
.files-seg-item:hover:not(.active) { color: var(--t1); }
.files-seg-item.active { background: var(--bg-subtle); color: var(--t1); }

/* Change rows */
.chg-row { display: flex; align-items: center; gap: 8px; padding: 5px 12px; font-size: 12.5px; }
.chg-row:hover { background: var(--bg-subtle); }
.chg-badge {
  flex-shrink: 0; width: 16px; text-align: center; font-size: 10px; font-weight: 700;
  border-radius: 3px; padding: 1px 0;
}
.chg-new { color: var(--green); background: var(--green-dim); }
.chg-modified { color: var(--yellow); background: rgba(245,158,11,0.14); }
.chg-deleted { color: var(--destruct); background: rgba(239,68,68,0.12); }
.chg-renamed { color: var(--blue); background: rgba(59,130,246,0.14); }
.chg-path {
  font-family: 'SF Mono','Menlo',monospace; color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; text-align: left;
}

.frow {
  display: flex;
  align-items: center;
  height: 22px;
  cursor: pointer;
  transition: background 0.08s;
  position: relative;
  padding-right: 8px;
}
.frow:hover { background: var(--bg-subtle); }
.frow.sel { background: var(--bg-subtle); }

.frow-pad { flex-shrink: 0; }
.frow-chev {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--t4);
  transition: transform 0.12s;
}
.frow-chev.open { transform: rotate(90deg); }
.frow-chev.leaf { opacity: 0; pointer-events: none; }
.frow-icon { width: 16px; text-align: center; flex-shrink: 0; font-size: 11px; }
.fname {
  font-size: 12.5px;
  color: var(--t1);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 3px;
  letter-spacing: -0.01em;
}
.fbadge {
  font-size: 9.5px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 5px;
  flex-shrink: 0;
}
.fbadge.m { background: rgba(234,179,8,0.12); color: #a16207; border: 1px solid rgba(234,179,8,0.2); }
.fbadge.n { background: rgba(34,197,94,0.1); color: #15803d; border: 1px solid rgba(34,197,94,0.2); }
.fsize {
  font-size: 10.5px;
  color: var(--t4);
  font-family: 'SF Mono','Menlo',monospace;
  flex-shrink: 0;
  min-width: 44px;
  text-align: right;
}

/* ── Page views ── */
.page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.page-hdr {
  height: 45px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}
.page-title { font-size: 13.5px; font-weight: 600; color: var(--t1); letter-spacing: -0.015em; }
.page-body { flex: 1; overflow-y: auto; padding: 18px; }

/* ── Home ── */
/* Welcome / empty state — hero + two CTAs + feature highlights when there are no sandboxes */
.home-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 14px; padding: 24px;
}
.home-empty-mark { opacity: 0.92; }
.home-empty-eyebrow {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  border: 1px solid var(--border); background: var(--bg-subtle);
  font-size: 11.5px; color: var(--t2);
}
.home-empty-title { font-size: 24px; font-weight: 700; color: var(--t1); letter-spacing: -0.03em; margin: 0; line-height: 1.15; }
.home-empty-sub { font-size: 13px; line-height: 1.55; color: var(--t3); max-width: 400px; margin: 0; }
.home-empty-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
.home-empty-features {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-top: 4px; width: 100%; max-width: 480px;
}
.home-empty-feat {
  display: flex; flex-direction: column; gap: 5px;
  padding: 13px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); text-align: left;
}
.home-empty-feat-ic { color: var(--t2); }
.home-empty-feat-title { font-size: 11.5px; font-weight: 600; color: var(--t1); }
.home-empty-feat-sub { font-size: 11px; color: var(--t3); line-height: 1.4; }

/* Full-width update bar — top of the dashboard, primary CTA */
.update-bar {
  flex-shrink: 0;
  /* Match the sidebar Home band (.sb-nav-first) and .page-hdr height so the
     bottom borders line up across the sidebar and content. */
  height: 45px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--primary) 10%, var(--bg));
}
.update-bar-ic { color: var(--primary); flex-shrink: 0; }
.update-bar-msg { font-size: 12.5px; color: var(--t1); min-width: 0; }
.update-bar-msg strong { font-weight: 600; }
.update-bar-cur { color: var(--t3); }
.update-bar-cta { margin-left: auto; flex-shrink: 0; }
.update-bar-x {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px; color: var(--t3);
  background: none; border: none; cursor: pointer;
}
.update-bar-x:hover { background: var(--bg-subtle); color: var(--t1); }

/* Dashboard fills the full page width and wraps responsively */
.home-dash { max-width: none; --avatar-surface: var(--bg); }
/* Compact dashboard overview — replaces the three vanity stat cards. */
.home-overview {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 12px 14px; margin-bottom: 18px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg);
}
.home-ov-counts { display: flex; align-items: center; gap: 8px; }
.home-ov-ic { color: var(--t3); flex-shrink: 0; margin-right: 2px; }
.home-ov-total { font-size: 22px; font-weight: 600; color: var(--t1); line-height: 1; letter-spacing: -0.02em; }
.home-ov-unit { font-size: 12.5px; color: var(--t3); margin-right: 6px; }
.home-ov-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--t2); padding-left: 6px;
}
.home-ov-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-hi); flex-shrink: 0; }
.home-ov-dot.on { background: var(--green); }
.home-ov-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.home-ov-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--t2); font-family: inherit;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 100px; padding: 4px 11px; cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
}
.home-ov-chip > svg { color: var(--t3); }
.home-ov-chip:not(.home-ov-chip-static):hover { border-color: var(--border-hi); color: var(--t1); }
.home-ov-chip-static { cursor: default; }

.home-stats { display: flex; gap: 12px; flex-wrap: wrap; }
.home-stat { flex: 1 1 150px; min-width: 150px; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.home-stat-btn { cursor: pointer; background: var(--bg); text-align: left; transition: all 0.1s; font: inherit; }
.home-stat-btn:hover { background: var(--bg-subtle); border-color: var(--border-hi); }
.home-stat-n { font-size: 26px; font-weight: 600; color: var(--t1); line-height: 1; }
.sbx-row-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.home-stat-l { font-size: 12px; color: var(--t3); margin-top: 6px; }
.home-row { display: flex; align-items: center; gap: 9px; padding: 9px 2px; cursor: pointer; border-radius: 6px; }
.home-row:hover { background: var(--bg-subtle); }
.home-row-name { font-size: 13px; color: var(--t1); font-weight: 500; }
.home-row-sub { font-size: 11.5px; color: var(--t3); }
.home-row-up { margin-left: auto; font-size: 11.5px; color: var(--t3); font-variant-numeric: tabular-nums; }

/* Running-now tree: project header + indented sandbox rows under it */
.home-tree { margin-top: 6px; }
.home-tree-proj {
  display: flex; align-items: center; gap: 8px; padding: 6px 2px; cursor: pointer; border-radius: 6px;
}
.home-tree-proj:hover { background: var(--bg-subtle); }
.home-tree-group { cursor: default; }
.home-tree-group:hover { background: none; }
.home-tree-proj-name { font-size: 12px; font-weight: 600; color: var(--t2); letter-spacing: -0.01em; }
.home-tree-proj-count {
  font-size: 10.5px; font-weight: 600; color: var(--t3); font-variant-numeric: tabular-nums;
  min-width: 17px; height: 17px; padding: 0 5px; border-radius: 100px;
  display: inline-flex; align-items: center; justify-content: center; background: var(--bg-subtle);
}
.home-tree-row { margin-left: 9px; padding-left: 12px; border-left: 1px solid var(--border); border-radius: 0 6px 6px 0; }
/* Dim stopped rows (keep the avatar hue, mirroring the sidebar). */
.home-tree-row.is-stopped .sbx-avatar { opacity: 0.7; }
.home-tree-row.is-stopped .home-row-name { color: var(--t2); }
.home-row-stop {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 5px;
  border: 1px solid var(--border); background: var(--bg); color: var(--t2);
  cursor: pointer; flex-shrink: 0;
}
.home-row-stop:hover { color: var(--destruct); border-color: var(--destruct); }
.home-row-stop:disabled { opacity: 0.4; cursor: default; }

/* Home status cards */
.home-cards { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.home-card {
  flex: 1 1 280px; min-width: 260px; display: flex; align-items: center; gap: 11px; text-align: left;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 14px; background: var(--bg); cursor: pointer; transition: all 0.1s;
}
.home-card:hover { background: var(--bg-subtle); border-color: var(--border-hi); }
.home-card-static { cursor: default; }
.home-card-static:hover { background: var(--bg); border-color: var(--border); }
.home-disk-break { display: flex; flex-direction: column; gap: 4px; margin-left: auto; flex-shrink: 0; }
.home-disk-break span {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--t2); font-variant-numeric: tabular-nums; white-space: nowrap;
}
.home-disk-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.ss-autosave { font-size: 11.5px; color: var(--t3); }

/* Sandbox info — collapsible sections */
.info-acc { border-top: 1px solid var(--border); }
.info-acc-hd {
  display: flex; align-items: center; gap: 7px; width: 100%;
  padding: 11px 2px; background: none; border: none; cursor: pointer; text-align: left;
}
.info-acc-chev { color: var(--t3); flex-shrink: 0; }
.info-acc-title { font-size: 12px; font-weight: 600; color: var(--t1); letter-spacing: -0.01em; }
.info-acc-badge {
  margin-left: auto; flex-shrink: 0; font-size: 10.5px; font-weight: 600; color: var(--t2);
  min-width: 18px; height: 18px; padding: 0 6px; border-radius: 100px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-subtle); font-variant-numeric: tabular-nums;
}
.info-acc-badge.alert { background: var(--destruct); color: #fff; }
.info-acc-badge.alert::before { content: '⚠ '; }
.info-acc-body { padding: 0 2px 14px; }

/* Dashboard attention row — sandboxes with network-policy blocks */
.home-attn {
  margin-bottom: 16px; border: 1px solid color-mix(in srgb, var(--destruct) 35%, var(--border));
  border-radius: var(--radius); background: color-mix(in srgb, var(--destruct) 6%, var(--bg)); padding: 10px 12px;
}
.home-attn-hd {
  display: flex; align-items: center; gap: 7px; margin-bottom: 6px;
  font-size: 12px; font-weight: 600; color: var(--t1);
}
.home-attn-ic { color: var(--destruct); }
.home-attn-row {
  display: flex; align-items: center; gap: 9px; padding: 6px 4px; cursor: pointer; border-radius: 6px;
}
.home-attn-row:hover { background: color-mix(in srgb, var(--destruct) 9%, transparent); }
.home-attn-name { font-size: 13px; color: var(--t1); font-weight: 500; }
.home-attn-hosts { font-size: 11.5px; color: var(--t3); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.home-attn-count {
  margin-left: auto; flex-shrink: 0; font-size: 10.5px; font-weight: 600;
  min-width: 18px; height: 18px; padding: 0 6px; border-radius: 100px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--destruct); color: #fff; font-variant-numeric: tabular-nums;
}

/* Recent network-policy blocks inside the info panel */
.np-blocks { margin-top: 12px; }
.np-blocks-hd {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  font-size: 11.5px; font-weight: 600; color: var(--t2);
}
.np-blocks-ic { color: var(--destruct); }
.np-block {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 4px;
  border: 1px solid var(--border); border-radius: 7px; background: var(--bg-subtle);
}
.np-block-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.np-block-host { font-size: 12.5px; color: var(--t1); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.np-block-meta { font-size: 10.5px; color: var(--t3); }

/* Recent blocks pinned at the top of the info panel — red-ish so they read as
   an alert that needs attention. */
.np-blocks-top {
  margin: 12px 14px 2px;
  padding: 10px 10px 6px;
  border: 1px solid color-mix(in srgb, var(--destruct) 35%, var(--border));
  border-radius: 10px;
  background: color-mix(in srgb, var(--destruct) 7%, var(--bg));
}
.np-blocks-top .np-blocks-hd { color: var(--destruct); }
.np-blocks-top .np-block {
  border-color: color-mix(in srgb, var(--destruct) 28%, var(--border));
  background: color-mix(in srgb, var(--destruct) 6%, var(--bg));
}
.np-blocks-top .np-block-host { color: var(--destruct); }

/* Toaster — transient policy-block alerts, bottom-right */
.toaster {
  position: fixed; right: 16px; bottom: 16px; z-index: 1000;
  display: flex; flex-direction: column; gap: 10px; max-width: 380px;
}
.toast {
  display: flex; align-items: flex-start; gap: 10px; padding: 12px;
  border: 1px solid var(--border-hi); border-radius: 10px; background: var(--bg);
  box-shadow: 0 8px 28px rgba(0,0,0,0.22); position: relative;
}
.toast-ic { color: var(--destruct); flex-shrink: 0; margin-top: 1px; }
.toast-main { flex: 1; min-width: 0; padding-right: 14px; }
.toast-title { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.toast-sub { font-size: 11.5px; color: var(--t2); margin-top: 1px; word-break: break-all; }
.toast-note { font-size: 11px; margin-top: 5px; }
.toast-note.ok { color: var(--green); }
.toast-note.err { color: var(--destruct); }
.toast-actions { margin-top: 8px; }
.toast-x {
  position: absolute; right: 6px; top: 6px;
  display: flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 5px; border: none; background: none;
  color: var(--t3); cursor: pointer;
}
.toast-x:hover { background: var(--bg-subtle); color: var(--t1); }
.home-card-ic {
  width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-subtle); color: var(--t2);
}
.home-card-body { flex: 1; min-width: 0; }
.home-card-title { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.home-card-sub {
  font-size: 11.5px; color: var(--t3); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.home-card-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  padding: 2px 7px; border-radius: 100px; flex-shrink: 0;
  background: color-mix(in srgb, var(--primary) 14%, var(--bg-subtle)); color: var(--t1);
}

/* ── Project detail (sandboxes + files) ── */
.proj-detail { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.proj-detail-main { flex: 1; min-width: 0; overflow-y: auto; padding: 16px 20px; }
.proj-detail-files {
  width: 320px; flex-shrink: 0; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.proj-detail-files .files-panel { flex: 1; min-height: 0; }

/* ── Projects ── */
.proj-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.proj-empty {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-align: center; color: var(--t3); font-size: 13px; padding: 40px 0;
}
.proj-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; }
.proj-hdr { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; min-width: 0; }
.proj-hdr-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.proj-hdr-line { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.proj-name { font-size: 13px; font-weight: 600; color: var(--t1); flex-shrink: 0; }
.proj-path { font-size: 11px; color: var(--t3); font-family: 'SF Mono','Menlo',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-git { display: flex; align-items: center; gap: 10px; min-width: 0; }
.proj-git-branch {
  display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0;
  max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  font-size: 11px; color: var(--t2);
}
.proj-git-branch svg { flex-shrink: 0; opacity: 0.8; }
.proj-git-remote {
  display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
  font-size: 11px; color: var(--t2);
  background: none; border: none; cursor: pointer; padding: 1px 4px; border-radius: 4px;
}
.proj-git-remote:hover { color: var(--t1); background: var(--bg-subtle); }
.proj-git-remote svg { flex-shrink: 0; opacity: 0.8; }
.proj-boxes { display: flex; flex-wrap: wrap; gap: 6px; }
.proj-box {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--t1); font-size: 12px; cursor: pointer;
}
.proj-box:hover { border-color: var(--border-hi); }

/* Full-width sandbox rows inside a project card */
.proj-sbxs { display: flex; flex-direction: column; gap: 4px; }
.proj-sbx {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--t1); cursor: pointer; transition: all 0.1s;
}
.proj-sbx:hover { background: var(--bg-subtle); border-color: var(--border-hi); }
.proj-sbx-name { font-size: 13px; font-weight: 500; color: var(--t1); flex-shrink: 0; }
.proj-sbx-meta {
  font-size: 11.5px; color: var(--t3); min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.proj-sbx-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.proj-sbx-status { font-size: 11px; font-weight: 600; }
.proj-sbx-status.running { color: var(--green); }
.proj-sbx-status.stopped { color: var(--t3); }
.proj-sbx-status.creating { color: var(--amber, #f59e0b); }
.proj-sbx-empty { font-size: 12px; color: var(--t3); padding: 2px 2px 6px; }
.proj-sbx-new {
  color: var(--t2); border-style: dashed; justify-content: center; gap: 6px;
  font-size: 12px; font-weight: 500;
}
.proj-sbx-new:hover { color: var(--t1); }
/* Kit → "Add to sandbox" inline picker */
/* "Add to sandbox" dropdown — anchored under the button. */
.kit-add-wrap { position: relative; }
.kit-add-menu {
  position: fixed; z-index: 200;
  min-width: 200px; max-width: 280px; max-height: 280px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
  padding: 6px; text-align: left;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.kit-add-empty { font-size: 12px; color: var(--t3); padding: 4px 6px; line-height: 1.4; }
.kit-add-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); padding: 2px 6px 4px; }
.kit-add-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t4); flex-shrink: 0; }
.kit-add-dot.on { background: var(--green); }
.kit-add-sb {
  display: flex; align-items: center; gap: 8px; width: 100%;
  font-size: 12.5px; color: var(--t1); text-align: left;
  background: transparent; border: none; border-radius: 6px;
  padding: 6px 8px; cursor: pointer;
}
.kit-add-sb:hover { background: var(--bg-subtle); }
.kit-add-sb:disabled { cursor: default; }
.kit-add-sb:disabled:hover { background: transparent; }
.kit-add-sb-name { flex: 1; }
.kit-add-sb:disabled .kit-add-sb-name { color: var(--t3); }
.kit-add-has {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  color: var(--green); background: var(--bg-subtle); border-radius: 100px; padding: 1px 7px;
}

/* Inline view/edit of a kit's spec.yaml */
.kit-spec-edit { padding: 8px 10px 12px; }
.kit-spec-area {
  width: 100%; min-height: 200px; resize: vertical;
  font-family: 'SF Mono','Menlo',monospace; font-size: 12px; line-height: 1.55;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; color: var(--t1); outline: none; tab-size: 2;
}
.kit-spec-area:focus { border-color: var(--border-hi); }
/* Read-only view mode: dim the code and drop the text-edit affordance. */
.kit-spec-area.readonly { color: var(--t2); cursor: default; }
.kit-spec-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 8px; }
.kit-spec-tabs { display: inline-flex; gap: 2px; background: var(--bg-subtle); border-radius: 6px; padding: 2px; margin-bottom: 8px; }
.kit-spec-tabs button { font-size: 12px; padding: 4px 12px; border-radius: 4px; border: none; background: none; color: var(--t2); cursor: pointer; }
.kit-spec-tabs button.on { background: var(--bg); color: var(--t1); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

/* Page sub-toolbar — a second bar under .page-hdr (mirrors the sandbox term-bar):
   segmented tabs on the left, contextual actions on the right. */
.page-subbar {
  height: 40px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
}
.page-subbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* Kits page — Your kits / Browse contrib segmented control */
.kit-tabs { display: inline-flex; gap: 2px; background: var(--bg-subtle); border-radius: 7px; padding: 2px; }
.kit-tabs button { font-size: 12px; padding: 4px 12px; border-radius: 5px; border: none; background: none; color: var(--t2); cursor: pointer; }
.kit-tabs button.on { background: var(--bg); color: var(--t1); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.kit-repo-link { color: var(--accent, var(--primary)); cursor: pointer; text-decoration: none; }
.kit-repo-link:hover { text-decoration: underline; }
@keyframes kit-spin { to { transform: rotate(360deg); } }
.spin { animation: kit-spin 0.9s linear infinite; }

/* Community kit gallery cards */
.kit-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.kit-card {
  display: flex; flex-direction: column; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
}
.kit-card-hd { display: flex; align-items: center; gap: 8px; }
.kit-card-hd > svg { color: var(--t3); flex-shrink: 0; }
.kit-card-name { font-size: 13.5px; font-weight: 600; color: var(--t1); flex: 1; }
.kit-card-has {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; color: var(--t3);
  background: var(--bg-subtle); border-radius: 100px; padding: 2px 7px; flex-shrink: 0;
}
.kit-card-desc { font-size: 12px; color: var(--t2); line-height: 1.45; margin: 0; }
.kit-card-actions { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 4px; }
.kit-card-link {
  display: inline-flex; align-items: center; gap: 4px; margin-right: auto;
  font-size: 11.5px; color: var(--t3); cursor: pointer; text-decoration: none;
}
.kit-card-link:hover { color: var(--t1); }
.ks-tag { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2); background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; }
.ks-tag-deny { color: var(--destruct); border-color: color-mix(in srgb, var(--destruct) 30%, var(--border)); }
.ks-cmd { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2); margin-top: 6px; word-break: break-all; }
.ks-memo { font-size: 12px; color: var(--t2); margin-top: 6px; white-space: pre-wrap; line-height: 1.5; }

/* New Sandbox modal — mixin multi-select chips */
/* Mixin kit picker — removable selected list + searchable dropdown */
.kit-sel-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 7px; }
.kit-sel-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--t1);
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 8px 6px 10px;
}
.kit-sel-item svg { color: var(--t3); flex-shrink: 0; }
.kit-sel-name { flex: 1; }
.kit-sel-rm { display: flex; background: none; border: none; cursor: pointer; color: var(--t3); padding: 2px; border-radius: 5px; }
.kit-sel-rm:hover { background: var(--bg-muted); color: var(--t1); }
.kit-sel-tag {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  color: var(--t3); background: var(--bg-muted); border-radius: 100px; padding: 1px 6px; margin-right: 4px;
}
.kit-dd-ref { color: var(--t1); }
.kit-dd-ref .kit-dd-ref-v { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2); margin-left: 2px; word-break: break-all; }

.kit-dd { position: relative; }
.kit-dd-trigger {
  display: flex; align-items: center; gap: 8px; width: 100%;
  font-size: 13px; color: var(--t2); cursor: pointer; text-align: left;
  background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius);
  padding: 7px 10px;
}
.kit-dd-trigger:hover { border-color: var(--border-hi); color: var(--t1); }
.kit-dd-menu {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 30;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18); overflow: hidden;
}
.kit-dd-search { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
.kit-dd-search-ic { color: var(--t3); flex-shrink: 0; }
.kit-dd-search input { flex: 1; border: none; background: none; outline: none; font-size: 12.5px; color: var(--t1); }
.kit-dd-options { max-height: 200px; overflow-y: auto; padding: 5px; }
.kit-dd-opt {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  font-size: 12.5px; color: var(--t1); cursor: pointer;
  background: none; border: none; border-radius: 6px; padding: 7px 8px;
}
.kit-dd-opt svg { color: var(--t3); }
.kit-dd-opt:hover { background: var(--bg-subtle); }
/* Option + capability-preview strip on one row. */
.kit-dd-opt-row { display: flex; align-items: center; gap: 2px; padding-right: 6px; border-radius: 6px; }
.kit-dd-opt-row:hover { background: var(--bg-subtle); }
.kit-dd-opt-row .kit-dd-opt { flex: 1; min-width: 0; }
.kit-dd-opt-row .kit-dd-opt:hover { background: none; }
.kit-dd-opt-row .kit-caps, .kit-sel-item .kit-caps { flex-shrink: 0; }
/* Compact capability strip (New Sandbox modal): icons + counts, no text labels. */
.kit-caps.compact .kit-cap-ic { padding: 0 6px; font-size: 11px; gap: 3px; }
.kit-caps.compact .kit-cap-ic svg { width: 13px; height: 13px; }
.kit-dd-empty { font-size: 12px; color: var(--t3); padding: 10px; text-align: center; }

/* New Kit — remote-MCP catalog as small cards */
.mcp-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 8px; max-height: 56vh; overflow-y: auto; padding: 2px;
}
.mcp-card {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 11px 8px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg); cursor: pointer; text-align: center; transition: all 0.1s;
}
.mcp-card:hover { border-color: var(--border-hi); background: var(--bg-subtle); }
.mcp-card.on { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
.mcp-card img { width: 26px; height: 26px; border-radius: 6px; object-fit: contain; }
.mcp-card-ic { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--t2); }
.mcp-card-name {
  font-size: 11px; font-weight: 500; color: var(--t1); line-height: 1.2;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.mcp-card-custom { border-style: dashed; }
/* It's an "add" action, not a selectable server — never show the selected/focus ring. */
.mcp-card-custom:focus, .mcp-card-custom:focus-visible { outline: none; box-shadow: none; border-color: var(--border); }
.mcp-card-custom:hover { border-color: var(--border-hi); }

/* MCP picker: search + category filter */
.mcp-filter { display: flex; gap: 7px; margin-bottom: 8px; }
.mcp-search {
  flex: 1; display: flex; align-items: center; gap: 6px;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 8px;
}
.mcp-search-ic { color: var(--t3); flex-shrink: 0; }
.mcp-search input { flex: 1; min-width: 0; background: none; border: none; outline: none; font-size: 12px; color: var(--t1); }
.mcp-search input::placeholder { color: var(--t3); }
.mcp-search-x { display: flex; background: none; border: none; cursor: pointer; color: var(--t3); padding: 0; }
.mcp-search-x:hover { color: var(--t1); }
.mcp-cat {
  appearance: none; -webkit-appearance: none;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; color: var(--t1); padding: 4px 22px 4px 9px; cursor: pointer; outline: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='gray' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat: no-repeat; background-position: right 7px center;
}
.mcp-empty { grid-column: 1 / -1; font-size: 12px; color: var(--t3); padding: 12px; text-align: center; }
/* Custom MCP: one big card spanning the whole grid row, inputs live inside it. */
.mcp-custom-card {
  grid-column: 1 / -1; display: flex; flex-direction: column; gap: 8px;
  padding: 11px; border: 1px dashed var(--border-hi); border-radius: 10px; background: var(--bg-subtle);
}
.mcp-custom-card-hd {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3);
}
.mcp-custom-add {
  margin-left: auto; display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; text-transform: none; letter-spacing: 0; font-weight: 500; color: var(--t2);
  background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer;
}
.mcp-custom-add:hover { border-color: var(--border-hi); color: var(--t1); }
.mcp-custom-row {
  display: flex; align-items: stretch; gap: 0;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg);
}
.mcp-custom-row:focus-within { border-color: var(--border-hi); }
.mcp-custom-row .finput { border: none; border-radius: 0; background: none; padding: 9px 11px; }
.mcp-custom-row .finput:focus { border: none; }
.mcp-custom-row .mcp-custom-name { flex: 0 0 150px; font-size: 12px; border-right: 1px solid var(--border); }
.mcp-custom-row .mcp-custom-url { flex: 1; min-width: 0; font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; }
.mcp-custom-row .kit-list-rm { border-radius: 0; padding: 0 11px; color: var(--t3); }
.mcp-custom-row .kit-list-rm:hover { color: var(--destruct); background: var(--bg-subtle); }

/* Kit visual summary (the info panel) */
.kit-info-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer; color: var(--t2); font-size: 12.5px; padding: 4px 0;
}
.kit-info-toggle:hover, .kit-info-toggle.on { color: var(--t1); }
.kit-summary {
  margin-top: 8px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-subtle); padding: 4px 12px;
}
.ks-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.ks-block { padding: 8px 0; border-bottom: 1px solid var(--border); }
.ks-row:last-child, .ks-block:last-child { border-bottom: none; }
.ks-k { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); flex-shrink: 0; }
.ks-v { font-size: 12.5px; color: var(--t1); text-align: right; }
.ks-mono { font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ks-mcps { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.ks-mcp { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--t1); background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 3px 9px 3px 4px; }
.ks-mcp img { width: 16px; height: 16px; border-radius: 4px; object-fit: contain; }
.ks-mcp .mcp-logo { width: 15px; height: 15px; flex-shrink: 0; color: var(--t1); }
.ks-mcp { padding-left: 9px; }
.ks-empty { font-size: 12px; color: var(--t3); padding: 8px 0; }

.proj-del {
  margin-left: auto; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  border: none; background: none; color: var(--t3); cursor: pointer;
}
.proj-del:hover { background: color-mix(in srgb, var(--destruct) 12%, transparent); color: var(--destruct); }
.proj-del-confirm {
  border: 1px solid color-mix(in srgb, var(--destruct) 35%, var(--border));
  border-radius: var(--radius); padding: 10px 12px;
  background: color-mix(in srgb, var(--destruct) 6%, transparent);
}
.proj-del-chk { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--t1); cursor: pointer; }
.proj-del-actions { display: flex; gap: 7px; margin-top: 10px; }

.proj-box-new { color: var(--t2); border-style: dashed; }
.proj-box-new:hover { color: var(--t1); border-color: var(--border-hi); }
.proj-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.proj-dot.running { background: var(--green); }
.proj-dot.stopped { background: var(--t4); }
.proj-dot.creating { background: var(--amber, #f59e0b); animation: pulse 1.4s infinite; }

/* --clone on a non-repo folder: warn + offer to initialize one. */
.clone-warn {
  display: flex; align-items: center; gap: 10px; margin-top: 8px;
  padding: 9px 11px; border-radius: 6px; font-size: 12px; color: var(--t2);
  border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent);
  background: color-mix(in srgb, var(--yellow) 10%, transparent);
}
.clone-warn span { flex: 1; }
.clone-warn code { font-size: 11px; background: var(--bg-subtle); padding: 1px 5px; border-radius: 4px; }
.clone-warn .btn { flex-shrink: 0; }

/* Files panel note: this sandbox's workspace is an isolated clone, so its files
   don't sync to the host until fetched back. */
.files-clone-note {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  margin: 6px 8px 8px; padding: 7px 9px; border-radius: 6px;
  font-size: 11.5px; line-height: 1.35; color: var(--t2);
  border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent);
  background: color-mix(in srgb, var(--yellow) 10%, transparent);
}
.files-clone-note > svg { flex-shrink: 0; color: var(--yellow); }
.files-clone-note span { flex: 1; }
.files-clone-note .btn { flex-shrink: 0; white-space: nowrap; }

/* ── Library (Templates / Kits / Mixins) ── */
.lib-tbl { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.lib-hdr, .lib-row {
  display: grid;
  grid-template-columns: 2fr 1.3fr 1.2fr 1fr;
  gap: 10px;
  align-items: center;
  padding: 8px 12px;
}
.lib-hdr-tpl, .lib-row-tpl {
  grid-template-columns: minmax(140px, 1.8fr) 1.2fr 1fr 76px;
}
.lib-hdr-kit, .lib-row-kit { grid-template-columns: minmax(140px, 1fr) 1.4fr auto; }
/* Column headers for the capability cells — same fixed grid as .kit-caps so each
   label sits directly above its column. */
.kit-caps-hdr { display: grid; grid-template-columns: 132px 104px 108px 116px 96px; justify-content: start; }
.kit-unpacked {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--t3); background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: 100px; padding: 1px 7px; margin-left: 8px;
}
.kit-caps { display: flex; flex-wrap: wrap; gap: 0; align-items: center; justify-content: flex-start; }
/* Full list: fixed positional columns so each capability type lines up in the
   same column across every row, table-style, even when a kit lacks some. */
.kit-caps:not(.compact) {
  display: grid;
  grid-template-columns: 132px 104px 108px 116px 96px;
  justify-content: start;
}
.kit-caps:not(.compact) .kit-cap-ic { padding: 0 12px 0 0; border-left: none; }
.kit-cap-ic.is-empty { pointer-events: none; color: var(--t3); }
.kit-cap-empty { font-size: 12px; color: var(--t3); }
.kit-cap-ic {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--t2); cursor: default;
  padding: 0 12px;
}
.kit-caps.compact .kit-cap-ic:first-child { padding-left: 0; }
.kit-caps.compact .kit-cap-ic + .kit-cap-ic { border-left: 1px solid var(--border); }
.kit-cap-ic:hover { color: var(--t1); }
.kit-cap-ic:hover svg { color: var(--t1); }

/* Capability hover popover (fixed-positioned to escape table overflow) */
.kit-pop {
  position: fixed; z-index: 300; min-width: 200px; max-width: 340px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18); padding: 8px; cursor: default;
}
.kit-pop-hd {
  font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--t3); padding: 2px 4px 6px;
}
.kit-pop-list { display: flex; flex-direction: column; gap: 3px; max-height: 240px; overflow-y: auto; }
.kit-pop-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--t1); padding: 3px 4px; }
.kit-pop-ic { width: 15px; height: 15px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
.kit-pop-mono { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2); word-break: break-all; }
.kit-pop-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.kit-pop-dot.allow { background: var(--green); }
.kit-pop-dot.deny { background: var(--destruct); }
.kit-pop-memo { font-size: 11.5px; line-height: 1.5; color: var(--t2); white-space: pre-wrap; max-height: 240px; overflow-y: auto; padding: 2px 4px; }

/* Clear row separators between kit rows */
.lib-tbl > div + div { border-top: 1px solid var(--border); }

/* Whole kit row is clickable to open details */
.lib-row-click { cursor: pointer; }
.lib-row-click:hover { background: var(--bg-subtle); }
.lib-row-click.open { background: var(--bg-subtle); }

/* Row "⋮" menu */
.kit-more-menu {
  position: fixed; z-index: 200; min-width: 180px;
  display: flex; flex-direction: column; gap: 2px; padding: 6px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.kit-more-item {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  font-size: 12.5px; color: var(--t1); cursor: pointer;
  background: none; border: none; border-radius: 6px; padding: 7px 9px;
}
.kit-more-item svg { color: var(--t3); }
.kit-more-item:hover { background: var(--bg-subtle); }
.kit-more-item.danger { color: var(--destruct); }
.kit-more-item.danger svg { color: var(--destruct); }
.kit-more-item.danger:hover { background: rgba(239,68,68,0.10); }
.kit-more-sep { height: 1px; background: var(--border); margin: 4px 2px; }

/* Generic row "⋮" dropdown (templates, and reusable elsewhere). */
.more-menu {
  position: fixed; z-index: 200; min-width: 190px;
  display: flex; flex-direction: column; gap: 2px; padding: 6px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.more-item {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  font-size: 12.5px; color: var(--t1); cursor: pointer;
  background: none; border: none; border-radius: 6px; padding: 7px 9px;
}
.more-item svg { color: var(--t3); }
.more-item:hover { background: var(--bg-subtle); }
.more-item.danger { color: var(--destruct); }
.more-item.danger svg { color: var(--destruct); }
.more-item.danger:hover { background: rgba(239,68,68,0.10); }
.more-sep { height: 1px; background: var(--border); margin: 4px 2px; }

/* Template inspect / details modal rows. */
.tpl-detail { display: flex; flex-direction: column; gap: 2px; }
.tpl-detail-row { display: flex; gap: 12px; padding: 7px 2px; border-bottom: 1px solid var(--border); }
.tpl-detail-row:last-child { border-bottom: none; }
.tpl-detail-k { flex: 0 0 96px; font-size: 12px; color: var(--t3); }
.tpl-detail-v {
  flex: 1; min-width: 0; font-size: 12.5px; color: var(--t1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: 'SF Mono', Menlo, monospace;
}

/* "Add remote" import panel (page-level) */
.kit-import-box {
  padding: 12px 14px 14px; margin-bottom: 12px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-subtle);
}

/* Post-upload share CTA */
.kit-share-cta {
  border: 1px solid var(--accent, var(--primary)); border-radius: 10px;
  background: color-mix(in srgb, var(--accent, var(--primary)) 7%, transparent);
  padding: 14px 16px; margin-bottom: 14px;
}
.kit-share-hd { display: flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 600; color: var(--t1); }
.kit-share-hd svg { color: var(--accent, var(--primary)); }
.kit-share-x { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--t3); font-size: 18px; line-height: 1; padding: 0 2px; }
.kit-share-x:hover { color: var(--t1); }
.kit-share-ref {
  margin: 10px 0; padding: 7px 10px; font-family: 'SF Mono','Menlo',monospace; font-size: 12px;
  color: var(--t1); background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  user-select: all; word-break: break-all;
}
.kit-share-desc { font-size: 12.5px; line-height: 1.5; color: var(--t2); margin: 0 0 12px; }
.kit-share-actions { display: flex; gap: 8px; }

/* "Upload to Hub" inline panel */
.kit-push-box { padding: 12px 14px 14px 30px; border-top: 1px solid var(--border); background: var(--bg-subtle); }
.kit-push-lbl { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); margin-bottom: 7px; }
.kit-push-row { display: flex; gap: 7px; align-items: center; }
.kit-push-input { flex: 1; font-family: 'SF Mono','Menlo',monospace; font-size: 12px; }
.kit-push-hint { font-size: 11px; color: var(--t3); margin-top: 7px; }
.kit-push-hint code { background: var(--bg-muted); padding: 1px 5px; border-radius: 4px; }
.kit-cap-ic svg { color: var(--t3); }
.kit-cap-lbl { color: var(--t2); }
.kit-cap-n { font-variant-numeric: tabular-nums; color: var(--t3); }
.tpl-icon-btn { padding: 4px 6px; }
.kit-star-btn.on, .kit-star-btn.on:hover { color: #f5b301; }
.flabel-hint { font-weight: 400; color: var(--t3); font-size: 10.5px; margin-left: 6px; }
.kit-list-row { display: flex; gap: 6px; margin-bottom: 6px; }
.kit-list-row .finput { flex: 1; font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; }
.kit-list-rm { padding: 4px 7px; color: var(--t3); flex-shrink: 0; }
.kit-list-rm:hover { color: var(--destruct); }
.kit-add-line {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: 1px dashed var(--border); border-radius: var(--radius);
  color: var(--t2); cursor: pointer; font-size: 12px; padding: 6px 10px; width: 100%; justify-content: center;
}
.kit-add-line:hover { border-color: var(--border-hi); color: var(--t1); }

/* Kit capability composer */
.cap-add { display: flex; flex-wrap: wrap; gap: 7px; }
.cap-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--t2);
  background: var(--bg-subtle); border: 1px dashed var(--border); border-radius: 100px;
  padding: 5px 11px; cursor: pointer;
}
.cap-chip:hover { color: var(--t1); border-color: var(--border-hi); }
.cap-cta-wrap { margin-top: 2px; }
.cap-cta {
  display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%;
  padding: 10px; border: 1px dashed var(--border-hi); border-radius: var(--radius);
  background: var(--bg-subtle); color: var(--t1); font-size: 13px; font-weight: 500; cursor: pointer;
}
.cap-cta:hover { border-color: var(--primary); color: var(--primary); background: color-mix(in srgb, var(--primary) 6%, var(--bg-subtle)); }
.cap-menu { margin-top: 6px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cap-menu-item { display: block; width: 100%; text-align: left; padding: 9px 12px; font-size: 12.5px; color: var(--t1); background: var(--bg); border: none; cursor: pointer; }
.cap-menu-item:hover { background: var(--bg-subtle); }
.cap-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.cap-block-hd {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  font-size: 12.5px; font-weight: 600; color: var(--t1);
}
.cap-rm { display: flex; background: none; border: none; cursor: pointer; color: var(--t3); padding: 2px; border-radius: 5px; }
.cap-rm:hover { color: var(--destruct); }
.cap-sub { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); margin-bottom: 6px; }
.kit-file {
  display: flex; align-items: center; gap: 7px; margin-bottom: 5px;
  padding: 5px 9px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; color: var(--t1);
}
.kit-file svg { color: var(--t3); flex-shrink: 0; }
.kit-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kit-file-rm { display: flex; background: none; border: none; cursor: pointer; color: var(--t3); padding: 0; }
.kit-file-rm:hover { color: var(--destruct); }
.lib-hdr {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--t3); background: var(--bg-muted); border-bottom: 1px solid var(--border);
}
.lib-row { font-size: 12.5px; color: var(--t2); border-bottom: 1px solid var(--border); }
.lib-row:last-child { border-bottom: none; }
.lib-primary {
  display: flex; align-items: center; gap: 7px; color: var(--t1); font-weight: 500;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.lib-muted { color: var(--t3); }
.lib-mono { font-family: 'SF Mono','Menlo',monospace; font-size: 11px; color: var(--t2); }

.lib-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
  color: var(--yellow); border: 1px solid var(--yellow); border-radius: 4px;
  padding: 1px 6px; background: rgba(245,158,11,0.08);
}

.lib-block { margin-bottom: 16px; }
.lib-block-title {
  font-size: 11px; font-weight: 600; color: var(--t2);
  font-family: 'SF Mono','Menlo',monospace; margin-bottom: 7px;
}
.lib-code {
  font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; line-height: 1.55;
  background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 13px; color: var(--t1); white-space: pre; overflow-x: auto;
}
.lib-cmd-row {
  display: flex; align-items: baseline; gap: 10px; padding: 5px 0;
  border-bottom: 1px solid var(--border); font-size: 12px;
}
.lib-cmd-row:last-child { border-bottom: none; }
.lib-cmd-row code { flex-shrink: 0; }

/* ── Logs viewer ── */
.logs { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.logs-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logs-follow { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--t2); cursor: pointer; }
/* Match the log source dropdown (.finput): same background, border, height. */
.logs-search {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; min-width: 200px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
}
.logs-search:focus-within { border-color: var(--t1); }
.logs-search-ic { color: var(--t3); flex-shrink: 0; }
.logs-search input {
  flex: 1; min-width: 0; background: none; border: none; outline: none;
  font-size: 13px; color: var(--t1);
}
.logs-search input::placeholder { color: var(--t3); }
.logs-search-count { font-size: 11px; color: var(--t3); font-variant-numeric: tabular-nums; }
.logs-search-x {
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0; color: var(--t3); flex-shrink: 0;
}
.logs-search-x:hover { color: var(--t1); }
.logs-body { flex: 1; min-height: 0; overflow: auto; background: #0a0a0a; }
.logs-pre {
  margin: 0; padding: 12px 14px; color: #d4d4d4;
  font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}

/* Actionable error card shown over the (dark) log area — its own app-surface
   background so the message and standard buttons stay readable. */
.logs-error {
  margin: 24px auto; max-width: 480px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 20px; text-align: center;
  background: var(--bg); color: var(--t1);
  border: 1px solid var(--border); border-radius: 10px;
}
.logs-error-msg { font-size: 13px; line-height: 1.5; }
.logs-error-actions { display: flex; gap: 8px; }

/* Source-kind chip in the bar (daemon sandbox count vs kit startup). */
.logs-kind {
  flex-shrink: 0; padding: 2px 8px; border-radius: 100px;
  font-size: 11px; font-weight: 500; color: var(--t2);
  background: var(--bg-subtle); border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}
.logs-kind-kit { color: var(--primary); border-color: color-mix(in srgb, var(--primary) 40%, var(--border)); }

/* Parsed, per-line log rows. Colours are tuned for the (usually dark) terminal
   theme background the viewer inherits. */
.logs-lines {
  font-family: 'SF Mono','Menlo',monospace; font-size: 11.5px; line-height: 1.55;
  padding: 4px 0;
}
.logline {
  display: flex; align-items: baseline; gap: 8px;
  padding: 2px 14px 2px 12px;
  border-left: 2px solid transparent;
  white-space: pre-wrap; word-break: break-word;
}
.logline:hover { background: rgba(127, 127, 127, 0.10); }
.logline.lvl-error { border-left-color: #f87171; background: rgba(248, 113, 113, 0.06); }
.logline.lvl-warn  { border-left-color: #fbbf24; }
.logline-time { flex-shrink: 0; opacity: 0.5; font-variant-numeric: tabular-nums; }
.logline-sid {
  flex-shrink: 0; padding: 0 5px; border-radius: 4px;
  border: 1px solid currentColor;
  font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  opacity: 0.95;
}
.logline-lvl {
  flex-shrink: 0; min-width: 34px; text-align: center;
  padding: 0 4px; border-radius: 3px; font-size: 10px; font-weight: 700;
  background: rgba(127, 127, 127, 0.18); color: inherit; opacity: 0.75;
}
.logline-lvl.lvl-error { background: rgba(248, 113, 113, 0.22); color: #fca5a5; opacity: 1; }
.logline-lvl.lvl-warn  { background: rgba(251, 191, 36, 0.22); color: #fcd34d; opacity: 1; }
.logline-lvl.lvl-info  { background: rgba(96, 165, 250, 0.18); color: #93c5fd; opacity: 0.9; }
.logline-lvl.lvl-debug { opacity: 0.5; }
.logline-comp { flex-shrink: 0; opacity: 0.55; }
.logline-msg { flex: 1; min-width: 0; }
.logline.lvl-error .logline-msg { color: #fca5a5; }
.logline.lvl-debug { opacity: 0.6; }

/* ── Secrets ── */
.secrets-tab-top { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.secrets-tab-top p { flex: 1; }
.sec-tbl { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.sec-hdr {
  display: grid;
  grid-template-columns: minmax(120px, 1.2fr) 64px minmax(0, 1fr) 132px;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
}
.sec-th { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); }

.sec-row {
  display: grid;
  grid-template-columns: minmax(120px, 1.2fr) 64px minmax(0, 1fr) 132px;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.1s;
}
.sec-row:last-child { border-bottom: none; }
.sec-row:hover { background: var(--bg-subtle); }

.sec-svc { display: flex; align-items: center; gap: 9px; }
.sec-ico {
  width: 24px; height: 24px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  background: var(--bg-subtle);
}
.sec-name { font-size: 13px; font-weight: 500; color: var(--t1); }
.sec-scope { font-size: 12px; color: var(--t2); }
.sec-st { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; min-width: 0; }
.sec-mask { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'SF Mono','Menlo',monospace; font-size: 11px; }
.sec-sd { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sec-st.ok { color: #16a34a; }
.sec-st.ok .sec-sd { background: var(--green); }
.sec-st.no { color: var(--t3); }
.sec-st.no .sec-sd { background: var(--border-hi); }
.sec-st.warn { color: #b45309; }
.sec-st.warn .sec-sd { background: #f59e0b; }
.sec-badge {
  flex-shrink: 0;
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 10px;
  font-weight: 600;
  line-height: 1;
  padding: 3px 6px;
  border-radius: 5px;
  background: var(--border-lo, rgba(127,127,127,0.14));
  color: var(--t3);
  border: 1px solid var(--border);
}
.sec-badge-warn {
  background: rgba(245, 158, 11, 0.14);
  color: #b45309;
  border-color: rgba(245, 158, 11, 0.4);
}

/* ── Settings ── */
/* Calm settings layout: no section boxes, no row divider lines. */
.ss { margin-bottom: 30px; }
.ss-hdr {
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--t3); margin-bottom: 6px; padding: 0 2px;
}
.ss-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 2px;
  gap: 16px;
}
.ss-lbl { font-size: 13px; font-weight: 500; color: var(--t1); }
.ss-sub { font-size: 11.5px; color: var(--t3); margin-top: 2px; }
.ss-user { color: var(--t1); font-weight: 600; }

/* Accent color swatches */
/* ── Theme dropdown icon ──────────────────────────────────────────────────── */
/* Mini window swatch shown beside each theme in the FieldSelect dropdown. */
.theme-ico {
  position: relative; width: 24px; height: 17px; border-radius: 4px;
  border: 1px solid rgba(0,0,0,0.12); overflow: hidden; display: block; flex-shrink: 0;
}
.theme-ico-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 8px;
  border-right: 1px solid rgba(0,0,0,0.07);
}
.theme-ico-dot {
  position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
  width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
}

.s-input {
  font-family: 'SF Mono','Menlo',monospace;
  font-size: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 9px;
  color: var(--t1);
  outline: none;
}
.s-input:focus { border-color: var(--t1); box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }

/* ── sbx Runtime tab ─────────────────────────────────────────────────────── */
.rt-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 100px;
  white-space: nowrap;
}
.rt-badge-update {
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 500;
  background: color-mix(in srgb, var(--primary) 12%, var(--bg-subtle));
  color: var(--t1);
  border: 1px solid color-mix(in srgb, var(--primary) 28%, transparent);
}
.rt-badge-update::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}
.rt-badge-ok {
  display: inline-flex; align-items: center; gap: 6px;

/* Embed: fill whatever frame we're given — no stage, no backdrop. */
html, body { height:100%; }
.app-root { height:100%; }
* { -webkit-user-select:none; user-select:none; }
input, textarea { -webkit-user-select:text; user-select:text; }

/* macOS traffic lights (drawn by the OS in the real app). */
.mock-traffic { display:flex; gap:8px; align-items:center; position:absolute; left:18px; top:0; bottom:0; }
.mock-traffic i { width:12px; height:12px; border-radius:50%; }
.mock-traffic .r { background:#ff5f57; } .mock-traffic .y { background:#febc2e; } .mock-traffic .g { background:#28c840; }

/* Adaptive terminal theme (the den default). The Settings terminal-theme picker
   overrides via --ov-tbg / --ov-tfg on <html>. */
.term { --tbg:var(--ov-tbg, #ffffff); --tfg:var(--ov-tfg, #2b2b2b); }
[data-theme="dark"] .term { --tbg:var(--ov-tbg, #0a0a0a); --tfg:var(--ov-tfg, #d4d4d4); }

/* Captured terminal frames (real CLI output serialized from xterm). */
.mock-term-view { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; background:var(--tbg); }
.mock-term-scroll {
  flex:1; overflow:auto; padding:8px 12px 12px;
  font-family:Menlo, Monaco, 'SF Mono', 'DejaVu Sans Mono', monospace;
  font-size:12px; line-height:1.25; color:var(--tfg);
  white-space:pre;
}
.mock-term-stopped { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:var(--tbg); }
.mock-term-stopped span { color:var(--tfg); opacity:0.4; font-size:12px; }
/* den ANSI palette (matches the app's adaptive terminal theme) */
.mock-term-scroll {
  --a0:#2b2b2b; --a1:#c0392b; --a2:#3c7d3f; --a3:#9a6700; --a4:#2f6fbf; --a5:#9b4bbf; --a6:#2a8a8a; --a7:#dcdcdc;
  --a8:#8a8a8a; --a9:#c0392b; --a10:#3c7d3f; --a11:#9a6700; --a12:#2f6fbf; --a13:#9b4bbf; --a14:#2a8a8a; --a15:#000000;
}
[data-theme="dark"] .mock-term-scroll {
  --a0:#1e1e1e; --a1:#f44747; --a2:#6a9955; --a3:#d7ba7d; --a4:#569cd6; --a5:#c586c0; --a6:#4ec9b0; --a7:#d4d4d4;
  --a8:#808080; --a9:#f44747; --a10:#6a9955; --a11:#d7ba7d; --a12:#569cd6; --a13:#c586c0; --a14:#4ec9b0; --a15:#ffffff;
}
.mock-term-scroll .a0{color:var(--a0)} .mock-term-scroll .a1{color:var(--a1)} .mock-term-scroll .a2{color:var(--a2)}
.mock-term-scroll .a3{color:var(--a3)} .mock-term-scroll .a4{color:var(--a4)} .mock-term-scroll .a5{color:var(--a5)}
.mock-term-scroll .a6{color:var(--a6)} .mock-term-scroll .a7{color:var(--a7)} .mock-term-scroll .a8{color:var(--a8)}
.mock-term-scroll .a9{color:var(--a9)} .mock-term-scroll .a10{color:var(--a10)} .mock-term-scroll .a11{color:var(--a11)}
.mock-term-scroll .a12{color:var(--a12)} .mock-term-scroll .a13{color:var(--a13)} .mock-term-scroll .a14{color:var(--a14)}
.mock-term-scroll .a15{color:var(--a15)}
.mock-term-scroll .tb{font-weight:700} .mock-term-scroll .td{opacity:0.6} .mock-term-scroll .ti{font-style:italic}
.mock-term-scroll .tu{text-decoration:underline}
.mock-term-scroll .tv{background:var(--tfg);color:var(--tbg)}
.tk-cursor-cell { background:var(--tfg); color:var(--tbg); animation:mock-blink 1.1s steps(1) infinite; }
@keyframes mock-blink { 50% { background:transparent; color:inherit; } }

/* Context-menu submenus open on hover (the app opens them from JS). */
.ctx-submenu { display:none; }
.ctx-has-sub:hover > .ctx-submenu { display:block; }

/* Small inline MCP glyph used where the app shows a fetched icon image. */
.mock-mcp-ic {
  display:inline-flex; align-items:center; justify-content:center;
  width:16px; height:16px; border-radius:4px; flex-shrink:0;
  background:var(--bg-subtle); border:1px solid var(--border); color:var(--t2);
}
/* Streaming creation log */
.create-log-pre { white-space:pre-wrap; }

/* Button-element variants of dropdown rows keep the app's row styling. */
button.agent-dd-item {
  width:100%; text-align:left; background:none; border:none;
  color:var(--t1); font:inherit; font-size:13px;
}
/* Non-interactive "many more" tail card in the MCP grid. */
.mcp-card-more { cursor:default; border-style:dashed; }
.mcp-card-more:hover { border-color:var(--border); background:var(--bg); }
.mcp-card-more .mcp-card-ic { color:var(--t3); font-size:18px; letter-spacing:2px; }
.mcp-card-more .mcp-card-name { color:var(--t3); }
</style>

function initials(name) {
  const parts = name.split(/[^a-zA-Z0-9]+/).filter(Boolean);
  return (parts.slice(0, 2).map((p) => p[0]).join('') || name[0] || '?').toUpperCase();
}
function activityState(s) {
  if (s.status === 'creating') return 'working';
  if (s.status !== 'running') return 'stopped';
  if (s.activity === 'working') return 'working';
  if (s.activity === 'waiting') return 'waiting';
  return 'running';
}
function statusLabel(s) {
  if (s.status === 'creating') return 'Creating…';
  if (s.status !== 'running') return 'Stopped';
  return s.activity === 'working' ? 'Working…' : s.activity === 'waiting' ? 'Waiting for you' : 'Running';
}
function avatar(s, size) {
  const st = s.color ? ` style="width:${size}px;height:${size}px;background:color-mix(in srgb, ${s.color} 22%, transparent);color:${s.color}"` : ` style="width:${size}px;height:${size}px"`;
  return `<div class="sbx-avatar"${st}>
    <span class="sbx-avatar-txt">${initials(s.name)}</span>
    <span class="sbx-avatar-badge">${agentIcon(s.agent, 11)}</span>
    <span class="sbx-avatar-activity ${activityState(s)}"></span>
  </div>`;
}

function countBadges(node) {
  if (!node.d) return node.b ? 1 : 0;

}
function fileRow(node, depth, path) {

  let html = `<div class="frow" data-file="${path}" data-file-dir="${node.d ? 1 : 0}">

    <div class="frow-chev${node.d ? (node.open ? ' open' : '') : ' leaf'}">${ic('chevron-right', 11)}</div>

    ${node.s ? `<span class="fsize">${node.s}</span>` : ''}

  if (node.d && node.open) html += (node.c || []).map((ch) => fileRow(ch, depth + 1, path + '/' + ch.n)).join('');

}

}

const CAP_DEFS = [
  { key: 'mcp', icon: 'plug', label: 'Remote MCP' },
  { key: 'net', icon: 'globe', label: 'Policies' },
  { key: 'env', icon: 'variable', label: 'Env vars' },

  { key: 'mem', icon: 'file-text', label: 'Memory' }

function kitCapCount(k, key) {
  const c = k.caps;
  if (key === 'mcp') return Array.isArray(c.mcp) ? c.mcp.length : (c.mcp || 0);
  if (key === 'net') return c.net && c.net.allow ? c.net.allow.length + c.net.deny.length : (c.net || 0);
  if (key === 'env') return Array.isArray(c.env) ? c.env.length : (c.env || 0);
  if (key === 'cmd') return Array.isArray(c.cmd) ? c.cmd.length : (c.cmd || 0);
  return c.mem ? 1 : 0;
}
function kitCaps(k, compact) {
  const cells = CAP_DEFS.map((d) => {

    return `<span class="kit-cap-ic">${ic(d.icon, 14)}${compact ? '' : `<span class="kit-cap-lbl">${d.label}</span>`}${d.key === 'mem' ? '' : `<span class="kit-cap-n">${n}</span>`}</span>`;
  }).join('');
  return `<div class="kit-caps${compact ? ' compact' : ''}">${cells}</div>`;

function mcpLogo(name) {
  return MCP_LOGOS[String(name).toLowerCase()] || ('<span class="mock-mcp-ic">' + ic('plug', 10) + '</span>');
}
function kitSummary(k, variant) {
  const c = k.caps;
  const rows = [];
  rows.push(`<div class="ks-row"><span class="ks-k">Kind</span><span class="ks-v">${variant === 'sandbox' ? 'Sandbox kit — full agent' : 'Mixin kit — add-on'}</span></div>`);
  if (variant === 'sandbox' && k.base) rows.push(`<div class="ks-row"><span class="ks-k">Base</span><span class="ks-v ks-mono">${k.base}</span></div>`);
  if (variant === 'sandbox' && k.entry) rows.push(`<div class="ks-row"><span class="ks-k">Entrypoint</span><span class="ks-v ks-mono">${k.entry}</span></div>`);
  if (c.mcp.length) rows.push(`<div class="ks-block"><span class="ks-k">Remote MCPs · ${c.mcp.length}</span>
    <div class="ks-mcps">${c.mcp.map((m) => `<span class="ks-mcp">${mcpLogo(m)}${m}</span>`).join('')}</div></div>`);
  if (c.net.allow.length || c.net.deny.length) rows.push(`<div class="ks-block"><span class="ks-k">Network · ${c.net.allow.length} allowed · ${c.net.deny.length} denied</span>
    <div class="ks-mcps">${c.net.allow.map((d) => `<span class="ks-tag">${d}</span>`).join('')}${c.net.deny.map((d) => `<span class="ks-tag ks-tag-deny">${d}</span>`).join('')}</div></div>`);
  if (c.cmd.length) rows.push(`<div class="ks-block"><span class="ks-k">Commands · ${c.cmd.length}</span>${c.cmd.map((x) => `<div class="ks-cmd">${esc(x)}</div>`).join('')}</div>`);
  if (c.env.length) rows.push(`<div class="ks-row"><span class="ks-k">Env vars</span><span class="ks-v">${c.env.length}</span></div>`);
  if (c.mem) rows.push(`<div class="ks-block"><span class="ks-k">Agent memory</span><div class="ks-memo">${esc(c.mem)}</div></div>`);
  return `<div class="kit-summary">${rows.join('')}</div>`;
}
function renderKits(variant) {
  const tab = state.kitTab[variant];
  const title = variant === 'mixin' ? 'Mixin Kits' : 'Sandbox Kits';
  const blurb = variant === 'mixin'
    ? 'Mixin kits layer extra tools, MCPs, credentials, and config onto an existing agent — stack several on a sandbox.'
    : 'Sandbox kits define a complete agent from scratch — image, entrypoint, network, and more.';
  const kits = KITS[variant];
  const rowIcon = variant === 'mixin' ? 'layers' : 'package';

  const library = `<div class="lib-tbl">
    <div class="lib-hdr lib-hdr-kit"><span>${variant === 'mixin' ? 'MIXIN KIT' : 'SANDBOX KIT'}</span><span>CAPABILITIES</span><span></span></div>
    ${kits.map((k) => {
      const open = state.openKit === `${variant}:${k.name}`;
      return `<div>
        <div class="lib-row lib-row-kit lib-row-click${open ? ' open' : ''}" data-kit="${variant}:${k.name}" title="View / edit kit">
          <div class="lib-primary">${ic(rowIcon, 14)}<span>${k.name}</span></div>
          ${kitCaps(k)}
          <div style="display:flex;gap:4px;justify-content:flex-end" data-stop>
            ${variant === 'mixin' ? `<button class="btn btn-ghost btn-sm tpl-icon-btn kit-star-btn${k.star ? ' on' : ''}" data-act="star" data-star="${k.name}" title="${k.star ? 'Default kit — auto-added to new sandboxes. Click to unset.' : 'Make default — auto-add to new sandboxes'}">${ic('star', 15).replace('fill="none"', k.star ? 'fill="currentColor"' : 'fill="none"')}</button>` : ''}
            <div class="kit-add-wrap">
              <button class="btn btn-default btn-sm" data-act="kit-add" data-kit-add="${variant}:${k.name}" title="Add this kit to a running sandbox">${ic('package-plus', 14)} Add to sandbox</button>
            </div>
            <button class="btn btn-ghost btn-sm tpl-icon-btn kit-more-btn" data-act="kit-more" data-kit-more="${variant}:${k.name}" title="More…">${ic('ellipsis-vertical', 15)}</button>
          </div>
        </div>
        ${open ? `<div class="kit-spec-edit" data-stop>
          <div class="kit-spec-tabs">
            <button class="${state.kitView === 'summary' ? 'on' : ''}" data-kit-view="summary">Summary</button>
            <button class="${state.kitView === 'code' ? 'on' : ''}" data-kit-view="code">Code</button>
          </div>
          ${state.kitView === 'summary'
            ? kitSummary(k, variant)
            : `<textarea class="kit-spec-area readonly" readonly spellcheck="false">${esc(k.spec)}</textarea>`}
          <div class="kit-spec-actions">
            <button class="btn btn-ghost btn-sm" data-act="kit-close">Close</button>
            <button class="btn btn-ghost btn-sm" data-kit-view="code">Edit code</button>
            <button class="btn btn-primary btn-sm">Edit</button>
          </div>
        </div>` : ''}
      </div>`;
    }).join('')}
  </div>`;

  const gallery = `<div class="kit-gallery">
    ${CONTRIB[variant].map((k) => `<div class="kit-card">
      <div class="kit-card-hd">
        ${ic(rowIcon, 15)}
        <span class="kit-card-name">${k.name}</span>
        ${k.imported ? `<span class="kit-card-has">${ic('check', 11)} Imported</span>` : ''}
      </div>
      <p class="kit-card-desc">${k.desc}</p>
      <div class="kit-caps">${CAP_DEFS.map((d) => {
        const n = k.caps[d.key] || 0;
        if (!n) return '<span class="kit-cap-ic is-empty"></span>';
        return `<span class="kit-cap-ic">${ic(d.icon, 14)}<span class="kit-cap-lbl">${d.label}</span>${d.key === 'mem' ? '' : `<span class="kit-cap-n">${n}</span>`}</span>`;
      }).join('')}</div>
      <div class="kit-card-actions">
        <a class="kit-card-link">${ic('globe', 12)} View source</a>
        <button class="btn btn-primary btn-sm">${ic('cloud-download', 13)} ${k.imported ? 'Re-import' : 'Import'}</button>
      </div>
    </div>`).join('')}
  </div>`;

  return `<div class="page">
    <div class="page-hdr"><span class="page-title">${title}</span><span class="lib-badge" style="margin-left:8px">Experimental</span></div>
    <div class="page-subbar">
      <div class="kit-tabs">
        <button class="${tab === 'library' ? 'on' : ''}" data-kit-tab="library">Your kits</button>
        <button class="${tab === 'browse' ? 'on' : ''}" data-kit-tab="browse">Browse contrib</button>
      </div>
      <div class="page-subbar-actions">
        ${tab === 'library'
          ? `<button class="btn btn-default btn-sm">${ic('cloud-download', 13)} Add remote</button>
             <button class="btn btn-primary btn-sm" data-act="new-kit">${ic('plus', 13)} New ${variant === 'mixin' ? 'mixin kit' : 'sandbox kit'}</button>`
          : `<button class="btn btn-default btn-sm">${ic('refresh-cw', 13)} Refresh</button>`}
      </div>
    </div>
    <div class="page-body home-dash">
      <p style="font-size:12.5px;color:var(--t3);margin-bottom:14px">
        ${tab === 'library'
          ? `${blurb} Managed by den and packed with <code>sbx kit pack</code>.`
          : `Community ${variant} kits from <a class="kit-repo-link">docker/sbx-kits-contrib</a>. Import one to add it to your library.`}
      </p>
      ${tab === 'library' ? library : gallery}
    </div>
  </div>`;
}

const KIT_CAPS_DEFS = [
  { key:'mcp', label:'Remote MCPs' },

const AGENT_BASES = {
  claude:   { image:'docker/sandbox-templates:claude-code-docker', entrypoint:'claude --dangerously-skip-permissions' },
  codex:    { image:'docker/sandbox-templates:codex-docker', entrypoint:'codex' },

  opencode: { image:'docker/sandbox-templates:opencode-docker', entrypoint:'opencode' },
